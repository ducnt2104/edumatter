<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduChem Forum Pro</title>
    <link rel="shortcut icon" href="../../favicon/educhem.svg" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* Hiệu ứng kính */
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden text-slate-800">

    <div id="status-bar" class="bg-rose-500 text-white text-sm font-medium text-center py-2 hidden shadow-md z-50 relative transition-all">
        <i class="fa-solid fa-triangle-exclamation mr-2"></i> Mất kết nối với Server! Hãy kiểm tra lại terminal node server.js
    </div>

    <div id="screen-login" class="flex h-full items-center justify-center bg-[url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center">
        <div class="absolute inset-0 bg-indigo-900/60 backdrop-blur-sm"></div>
        <div class="glass p-10 rounded-3xl shadow-2xl w-[400px] relative z-10 transform transition-all border border-white/50">
            <div class="text-center mb-8">
                <div class="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg text-white text-2xl">
                    <i class="fa-solid fa-flask"></i>
                </div>
                <h1 class="text-3xl font-bold text-slate-800">EduChem<span class="text-indigo-600">Pro</span></h1>
                <p class="text-slate-500 mt-2 text-sm">Cộng đồng trao đổi kiến thức</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Tên hiển thị của bạn</label>
                    <div class="relative">
                        <i class="fa-regular fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="username" class="w-full border border-slate-300 pl-10 pr-4 py-3 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="Ví dụ: Nguyễn Văn A..." onkeypress="if(event.key === 'Enter') login()"/>
                    </div>
                </div>
                <button onclick="login()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 hover:shadow-lg transition-all transform hover:-translate-y-0.5">
                    BẮT ĐẦU <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="screen-lobby" class="hidden h-full flex flex-col bg-slate-50">
        <header class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center z-10">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 text-white w-10 h-10 rounded-lg flex items-center justify-center font-bold text-xl"><i class="fa-solid fa-flask"></i></div>
                <h2 class="font-bold text-xl text-slate-800 hidden md:block">EduChem Forum</h2>
            </div>
            
            <div class="flex-1 max-w-md mx-6">
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="search-room" onkeyup="filterRooms()" class="w-full bg-slate-100 border-none pl-10 pr-4 py-2.5 rounded-full focus:ring-2 focus:ring-indigo-500 outline-none text-sm" placeholder="Tìm kiếm phòng chat..."/>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 border-r pr-4">
                    <img id="my-avatar" src="" class="w-8 h-8 rounded-full shadow-sm border border-slate-200">
                    <span id="display-name" class="font-semibold text-slate-700"></span>
                </div>
                <button onclick="toggleModal(true)" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-full font-medium transition-all shadow-sm flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> <span class="hidden sm:inline">Tạo Phòng</span>
                </button>
            </div>
        </header>

        <main class="flex-1 p-6 overflow-y-auto">
            <div class="max-w-6xl mx-auto">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <h3 class="text-2xl font-bold text-slate-800">Khám phá các phòng</h3>
                        <p class="text-slate-500 text-sm mt-1">Tham gia thảo luận cùng mọi người</p>
                    </div>
                </div>

                <div id="room-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <p class="text-center w-full col-span-full text-slate-500 mt-10" id="loading-text">
                        <i class="fa-solid fa-spinner fa-spin text-indigo-500 text-2xl mb-2 block"></i> Đang tải dữ liệu...
                    </p>
                </div>
            </div>
        </main>
    </div>

    <div id="screen-chat" class="hidden h-full flex overflow-hidden bg-slate-50">
        
        <div class="flex-1 flex flex-col h-full relative">
            <header class="bg-white/80 backdrop-blur-md border-b px-4 py-3 flex justify-between items-center z-10">
                <div class="flex items-center gap-4">
                    <button onclick="leaveRoom()" class="text-slate-500 hover:text-indigo-600 transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-indigo-50">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <div>
                        <h3 id="current-room-name" class="font-bold text-lg text-slate-800 leading-tight">Phòng Chat</h3>
                        <p class="text-xs text-green-500 font-medium"><i class="fa-solid fa-circle text-[8px] mr-1"></i> Đang trực tuyến</p>
                    </div>
                </div>
                <button class="text-slate-400 hover:text-slate-600" title="Thông tin phòng">
                    <i class="fa-solid fa-circle-info text-xl"></i>
                </button>
            </header>

            <div id="msg-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 scroll-smooth">
                <div class="text-center my-6">
                    <div class="inline-block bg-indigo-100 text-indigo-800 text-xs font-semibold px-3 py-1 rounded-full mb-2">Hôm nay</div>
                </div>
            </div>

            <div id="typing-indicator" class="hidden px-6 py-1 text-xs text-slate-400 italic">
                Ai đó đang gõ...
            </div>

            <div class="bg-white border-t p-4">
                <div class="max-w-5xl mx-auto">
                    <div id="file-preview" class="hidden flex items-center gap-3 bg-slate-100 p-2 rounded-lg mb-3 w-max max-w-full overflow-hidden border border-slate-200">
                        <div id="image-preview-container" class="hidden w-10 h-10 rounded overflow-hidden bg-slate-200 flex-shrink-0">
                            <img id="image-preview" src="" class="w-full h-full object-cover">
                        </div>
                        <i id="file-icon" class="fa-solid fa-file-lines text-2xl text-slate-400 hidden"></i>
                        <div class="flex flex-col min-w-0">
                            <span class="text-xs text-slate-500">Đính kèm:</span>
                            <span id="preview-name" class="text-sm font-semibold text-slate-700 truncate"></span>
                        </div>
                        <button onclick="clearFile()" class="text-slate-400 hover:text-rose-500 ml-2 p-1 rounded-full hover:bg-rose-50 transition-colors">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                    <form onsubmit="sendMessage(event)" class="flex items-end gap-2 bg-slate-100 rounded-2xl p-2 border border-slate-200 focus-within:border-indigo-400 focus-within:ring-2 focus-within:ring-indigo-100 transition-all">
                        
                        <label class="cursor-pointer text-slate-400 hover:text-indigo-600 p-2 rounded-xl hover:bg-white transition-colors flex-shrink-0">
                            <i class="fa-solid fa-paperclip text-lg"></i>
                            <input type="file" id="file-input" class="hidden" onchange="handleFileSelect(this)" />
                        </label>

                        <input id="msg-input" type="text" class="flex-1 bg-transparent border-none py-2 px-2 focus:ring-0 outline-none text-slate-700" placeholder="Soạn tin nhắn..." autocomplete="off" oninput="handleTyping()" />
                        
                        <div class="hidden sm:flex items-center gap-1 text-xl mr-2">
                            <button type="button" onclick="insertEmoji('👍')" class="hover:scale-125 transition-transform cursor-pointer">👍</button>
                            <button type="button" onclick="insertEmoji('😂')" class="hover:scale-125 transition-transform cursor-pointer">😂</button>
                            <button type="button" onclick="insertEmoji('❤️')" class="hover:scale-125 transition-transform cursor-pointer">❤️</button>
                        </div>

                        <button type="submit" id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fa-solid fa-paper-plane text-sm"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-create" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 transition-opacity duration-300">
        <div class="bg-white p-6 rounded-2xl w-[400px] shadow-2xl transform scale-95 transition-transform duration-300" id="modal-content">
            <div class="flex justify-between items-center mb-5">
                <h3 class="font-bold text-xl text-slate-800">Tạo Phòng Thảo Luận</h3>
                <button onclick="toggleModal(false)" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Tên phòng *</label>
                    <input id="new-room-name" class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="VD: Giải Hóa Hữu Cơ 12" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu <span class="text-slate-400 font-normal">(để trống nếu công khai)</span></label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                        <input type="password" id="new-room-pass" class="w-full border border-slate-300 pl-10 pr-3 p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Nhập mật khẩu..." />
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-6">
                <button onclick="toggleModal(false)" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium transition-colors">Hủy</button>
                <button onclick="createRoom()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-md">Tạo Mới</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        let myName = "";
        let currentRoomId = "";
        let selectedFile = null;
        let allRooms = []; // Lưu danh sách phòng để làm tính năng search
        let typingTimeout = null;

        // Hàm tạo Avatar từ tên
        function getAvatarUrl(name) {
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff&size=128&bold=true`;
        }

        // --- KẾT NỐI ---
        socket.on("connect", () => {
            console.log("✅ Đã kết nối Socket thành công!");
            document.getElementById("status-bar").classList.add("hidden");
            const loading = document.getElementById("loading-text");
            if (loading) loading.innerHTML = '<i class="fa-solid fa-inbox text-slate-300 text-4xl mb-3 block"></i>Chưa có phòng nào. Hãy là người đầu tiên tạo phòng!';
        });

        socket.on("connect_error", (err) => {
            console.error("❌ Lỗi kết nối:", err);
            document.getElementById("status-bar").classList.remove("hidden");
        });

        // --- LOGIC CHÍNH ---
        function login() {
            const nameInput = document.getElementById("username");
            const name = nameInput.value.trim();
            if (!name) {
                nameInput.classList.add('border-rose-500', 'ring-2', 'ring-rose-200');
                setTimeout(() => nameInput.classList.remove('border-rose-500', 'ring-2', 'ring-rose-200'), 1000);
                return;
            }
            myName = name;
            document.getElementById("display-name").innerText = name;
            document.getElementById("my-avatar").src = getAvatarUrl(name);
            
            // Đổi màn hình
            document.getElementById("screen-login").classList.add("hidden");
            document.getElementById("screen-lobby").classList.remove("hidden");

            socket.emit("get_initial_rooms");
        }

        // Tắt mở modal có hiệu ứng
        function toggleModal(show) {
            const modal = document.getElementById("modal-create");
            const content = document.getElementById("modal-content");
            if (show) {
                modal.classList.remove("hidden");
                setTimeout(() => {
                    modal.classList.remove("opacity-0");
                    content.classList.remove("scale-95");
                }, 10);
            } else {
                modal.classList.add("opacity-0");
                content.classList.add("scale-95");
                setTimeout(() => modal.classList.add("hidden"), 300);
            }
        }

        // --- XỬ LÝ PHÒNG ---
        socket.on("update_rooms", (rooms) => {
            allRooms = rooms; 
            renderRoomList(rooms);
        });

        function filterRooms() {
            const keyword = document.getElementById("search-room").value.toLowerCase();
            const filtered = allRooms.filter(r => r.name.toLowerCase().includes(keyword));
            renderRoomList(filtered);
        }

        function renderRoomList(rooms) {
            const list = document.getElementById("room-list");
            list.innerHTML = "";

            if (rooms.length === 0) {
                list.innerHTML = `<p class="text-center w-full col-span-full text-slate-500 mt-10"><i class="fa-solid fa-magnifying-glass text-2xl block mb-2 text-slate-300"></i>Không tìm thấy phòng nào.</p>`;
                return;
            }

            rooms.forEach((room) => {
                const div = document.createElement("div");
                div.className = "bg-white p-5 rounded-2xl border border-slate-200 hover:border-indigo-300 hover:shadow-xl cursor-pointer transition-all transform hover:-translate-y-1 group relative overflow-hidden";
                div.onclick = () => joinRoomRequest(room.id, room.isPrivate);
                
                const icon = room.isPrivate ? '<i class="fa-solid fa-lock text-rose-400"></i>' : '<i class="fa-solid fa-earth-americas text-emerald-500"></i>';
                
                div.innerHTML = `
                    <div class="absolute top-0 left-0 w-1 h-full ${room.isPrivate ? 'bg-rose-400' : 'bg-emerald-400'}"></div>
                    <div class="flex justify-between items-start mb-3">
                        <div class="font-bold text-slate-800 text-lg truncate pr-2 group-hover:text-indigo-600 transition-colors">${room.name}</div>
                        <div class="text-sm bg-slate-100 p-1.5 rounded-lg" title="${room.isPrivate ? 'Phòng kín' : 'Công khai'}">${icon}</div>
                    </div>
                    <div class="flex items-center justify-between mt-4">
                        <div class="flex items-center text-xs font-medium text-slate-500 bg-slate-100 px-2 py-1 rounded-md">
                            <i class="fa-solid fa-users mr-1.5"></i> ${room.count} người
                        </div>
                        <span class="text-xs text-indigo-600 font-semibold opacity-0 group-hover:opacity-100 transition-opacity">Tham gia <i class="fa-solid fa-arrow-right ml-1"></i></span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function createRoom() {
            const name = document.getElementById("new-room-name").value;
            const pass = document.getElementById("new-room-pass").value;
            if (!name) return alert("Vui lòng nhập tên phòng!");

            socket.emit("create_room", { name, password: pass, owner: myName });
            toggleModal(false);
            document.getElementById("new-room-name").value = "";
            document.getElementById("new-room-pass").value = "";
        }

        function joinRoomRequest(roomId, isPrivate) {
            let password = "";
            if (isPrivate) {
                password = prompt("🔒 Phòng này yêu cầu mật khẩu:");
                if (password === null) return;
            }
            socket.emit("join_room", { roomId, password, username: myName });
        }

        // --- XỬ LÝ TRONG PHÒNG ---
        socket.on("join_success", (data) => {
            currentRoomId = data.roomId;
            document.getElementById("current-room-name").innerText = data.roomName;
            document.getElementById("screen-lobby").classList.add("hidden");
            document.getElementById("screen-chat").classList.remove("hidden");
            document.getElementById("msg-container").innerHTML = `<div class="text-center my-6"><div class="inline-block bg-indigo-100 text-indigo-800 text-xs font-semibold px-3 py-1 rounded-full mb-2">Bắt đầu cuộc trò chuyện</div></div>`;
            
            if(data.history) {
                data.history.forEach(renderMessage);
            }
        });

        socket.on("error_msg", (msg) => alert(msg));

        function leaveRoom() {
            socket.emit("leave_room", { roomId: currentRoomId, username: myName });
            document.getElementById("screen-chat").classList.add("hidden");
            document.getElementById("screen-lobby").classList.remove("hidden");
            currentRoomId = "";
        }

        // --- CHAT & FILE ---
        function insertEmoji(emoji) {
            const input = document.getElementById("msg-input");
            input.value += emoji;
            input.focus();
        }

        function handleFileSelect(input) {
            if (input.files[0]) {
                selectedFile = input.files[0];
                document.getElementById("file-preview").classList.remove("hidden");
                document.getElementById("preview-name").innerText = selectedFile.name;
                
                const imgPreviewCont = document.getElementById("image-preview-container");
                const fileIcon = document.getElementById("file-icon");
                const imgPreview = document.getElementById("image-preview");

                // Nếu là ảnh, hiện thumbnail
                if (selectedFile.type.startsWith('image/')) {
                    imgPreviewCont.classList.remove("hidden");
                    fileIcon.classList.add("hidden");
                    const reader = new FileReader();
                    reader.onload = (e) => imgPreview.src = e.target.result;
                    reader.readAsDataURL(selectedFile);
                } else {
                    imgPreviewCont.classList.add("hidden");
                    fileIcon.classList.remove("hidden");
                }
            }
        }

        function clearFile() {
            selectedFile = null;
            document.getElementById("file-input").value = "";
            document.getElementById("file-preview").classList.add("hidden");
        }

        function handleTyping() {
            socket.emit("typing", { roomId: currentRoomId, username: myName });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit("stop_typing", { roomId: currentRoomId });
            }, 1000);
        }

        // Lắng nghe sự kiện gõ từ server (Yêu cầu server xử lý)
        socket.on("user_typing", (data) => {
            const indicator = document.getElementById("typing-indicator");
            indicator.innerText = `${data.username} đang soạn tin...`;
            indicator.classList.remove("hidden");
        });

        socket.on("user_stop_typing", () => {
            document.getElementById("typing-indicator").classList.add("hidden");
        });

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById("msg-input");
            const btn = document.getElementById("send-btn");
            const content = input.value.trim();

            if (!content && !selectedFile) return;

            // Vô hiệu hóa nút gửi tạm thời
            btn.disabled = true;

            let msgData = {
                roomId: currentRoomId,
                username: myName,
                content,
                type: "text",
                time: new Date().toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'}) // Thêm timestamp
            };

            if (selectedFile) {
                const formData = new FormData();
                formData.append("file", selectedFile);
                try {
                    const res = await fetch("/upload", { method: "POST", body: formData });
                    const data = await res.json();
                    if (data.success) {
                        msgData.type = data.fileType;
                        msgData.content = data.fileUrl;
                        msgData.fileName = data.fileName;
                        // Nếu vừa có file vừa có chữ
                        if(content) msgData.textCaption = content; 
                    }
                } catch (err) {
                    alert("Lỗi upload file!");
                    btn.disabled = false;
                    return;
                }
            }

            socket.emit("send_msg", msgData);
            socket.emit("stop_typing", { roomId: currentRoomId });
            
            input.value = "";
            clearFile();
            btn.disabled = false;
        }

        socket.on("receive_msg", (msg) => {
            // Đảm bảo tin nhắn đến có time, nếu không thì tự gắn
            if(!msg.time) msg.time = new Date().toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});
            renderMessage(msg);
        });

        socket.on("system_msg", (txt) => {
            const box = document.getElementById("msg-container");
            box.insertAdjacentHTML("beforeend", `
                <div class="flex justify-center my-3">
                    <span class="bg-slate-200 text-slate-600 text-xs py-1 px-4 rounded-full font-medium shadow-sm">${txt}</span>
                </div>
            `);
            box.scrollTop = box.scrollHeight;
        });

        function renderMessage(msg) {
            const box = document.getElementById("msg-container");
            const isMe = msg.username === myName;
            const avatarUrl = getAvatarUrl(msg.username);

            let contentHtml = '';
            
            // Xử lý nội dung dựa trên type
            if (msg.type === "image") {
                contentHtml = `<img src="${msg.content}" class="max-w-[250px] w-full rounded-lg border border-black/10 cursor-pointer hover:opacity-90 transition-opacity mb-1" onclick="window.open(this.src)">`;
                if(msg.textCaption) contentHtml += `<p class="mt-1">${msg.textCaption}</p>`;
            } else if (msg.type === "file") {
                contentHtml = `
                    <a href="${msg.content}" target="_blank" class="flex items-center gap-3 bg-black/5 p-3 rounded-lg hover:bg-black/10 transition-colors no-underline text-inherit">
                        <div class="bg-indigo-500 text-white w-10 h-10 rounded flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-file"></i></div>
                        <div class="overflow-hidden">
                            <p class="font-semibold text-sm truncate">${msg.fileName}</p>
                            <p class="text-[10px] opacity-70">Nhấn để tải xuống</p>
                        </div>
                    </a>`;
                if(msg.textCaption) contentHtml += `<p class="mt-2">${msg.textCaption}</p>`;
            } else {
                contentHtml = `<p class="whitespace-pre-wrap break-words">${msg.content}</p>`;
            }

            if (msg.type === "text" && !msg.content) return;

            // Xây dựng Chat Bubble
            const html = `
                <div class="flex gap-3 w-full ${isMe ? "flex-row-reverse" : "flex-row"} group">
                    <img src="${avatarUrl}" class="w-8 h-8 rounded-full shadow-sm flex-shrink-0 mt-1">
                    <div class="flex flex-col ${isMe ? "items-end" : "items-start"} max-w-[75%]">
                        <div class="flex items-baseline gap-2 mb-1 px-1">
                            <span class="text-xs font-semibold text-slate-600">${isMe ? "Bạn" : msg.username}</span>
                            <span class="text-[10px] text-slate-400 font-medium">${msg.time}</span>
                        </div>
                        <div class="px-4 py-2.5 rounded-2xl shadow-sm text-sm ${
                            isMe 
                            ? "bg-indigo-600 text-white rounded-tr-none" 
                            : "bg-white border border-slate-200 text-slate-800 rounded-tl-none"
                        }">
                            ${contentHtml}
                        </div>
                    </div>
                </div>`;
                
            box.insertAdjacentHTML("beforeend", html);
            
            // Tự động cuộn xuống dưới cùng
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
