<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>EduChem Forum - Nền tảng trao đổi học liệu</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <!-- SweetAlert2 cho UI thông báo đẹp -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                500: "#3b82f6",
                600: "#2563eb",
                900: "#1e3a8a",
              },
            },
            animation: {
              "fade-in": "fadeIn 0.3s ease-out",
              "slide-up": "slideUp 0.4s ease-out",
            },
            keyframes: {
              fadeIn: { "0%": { opacity: "0" }, "100%": { opacity: "1" } },
              slideUp: {
                "0%": { transform: "translateY(20px)", opacity: "0" },
                "100%": { transform: "translateY(0)", opacity: "1" },
              },
            },
          },
        },
      };
    </script>
    <style>
      /* Tùy chỉnh thanh cuộn */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .chat-bg {
        background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
      }
    </style>
  </head>
  <body
    class="bg-gray-50 font-sans h-screen w-screen overflow-hidden text-gray-800"
  >
    <!-- Trạng thái kết nối -->
    <div
      id="status-bar"
      class="fixed top-0 w-full bg-red-500 text-white text-sm font-medium text-center py-2 z-50 hidden shadow-md transition-all"
    >
      <i class="fa-solid fa-triangle-exclamation mr-2"></i> Mất kết nối với
      Server! Hãy kiểm tra lại backend.
    </div>

    <!-- MÀN HÌNH ĐĂNG NHẬP -->
    <div
      id="screen-login"
      class="flex h-full items-center justify-center bg-gradient-to-br from-brand-600 to-indigo-800 p-4 absolute inset-0 z-40 transition-opacity duration-500"
    >
      <div
        class="glass-card p-8 rounded-2xl shadow-2xl w-full max-w-md animate-slide-up relative overflow-hidden"
      >
        <div class="absolute -top-10 -right-10 text-brand-100 opacity-20">
          <i class="fa-solid fa-flask text-9xl"></i>
        </div>

        <div class="text-center mb-8 relative z-10">
          <div
            class="bg-brand-100 text-brand-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg border-4 border-white"
          >
            <i class="fa-solid fa-atom text-4xl"></i>
          </div>
          <h1 class="text-3xl font-bold text-gray-800 tracking-tight">
            EduChem
          </h1>
          <p class="text-gray-500 text-sm mt-1">
            Cộng đồng trao đổi học liệu Hóa Học
          </p>
        </div>

        <div class="space-y-5 relative z-10">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Chọn một Avatar vui nhộn</label
            >
            <div class="flex justify-between gap-2" id="avatar-selector">
              <!-- Rendered via JS -->
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Tên hiển thị của bạn</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <i class="fa-regular fa-user text-gray-400"></i>
              </div>
              <input
                type="text"
                id="username"
                class="w-full border border-gray-300 rounded-xl pl-10 pr-4 py-3 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-shadow"
                placeholder="VD: Mendeleev, Nobel..."
                onkeypress="if (event.key === 'Enter') login();"
              />
            </div>
          </div>

          <button
            onclick="login()"
            class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3.5 rounded-xl shadow-md hover:shadow-lg transition-all transform active:scale-95 flex justify-center items-center gap-2"
          >
            Vào Phòng Ngay <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- MÀN HÌNH LOBBY (DANH SÁCH PHÒNG) -->
    <div
      id="screen-lobby"
      class="hidden h-full flex-col bg-gray-50 w-full max-w-6xl mx-auto shadow-2xl relative"
    >
      <!-- Header Lobby -->
      <div
        class="bg-white px-6 py-4 flex justify-between items-center border-b border-gray-200 shadow-sm z-10"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 bg-brand-100 rounded-full flex items-center justify-center text-xl shadow-sm border border-brand-200"
            id="my-avatar-display"
          >
            👨‍🔬
          </div>
          <div>
            <h2 class="font-bold text-lg text-gray-800 leading-tight">
              Sảnh Chờ
            </h2>
            <p class="text-xs text-brand-600 font-medium" id="display-name">
              Xin chào!
            </p>
          </div>
        </div>
        <button
          onclick="toggleModal(true)"
          class="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg font-medium shadow-sm transition-colors flex items-center gap-2 text-sm sm:text-base"
        >
          <i class="fa-solid fa-plus"></i>
          <span class="hidden sm:inline">Tạo phòng học</span>
        </button>
      </div>

      <!-- Main Lobby -->
      <div class="flex-1 p-6 overflow-y-auto bg-gray-50">
        <div
          class="mb-6 flex flex-col sm:flex-row gap-4 justify-between items-center"
        >
          <h3 class="text-xl font-bold text-gray-700">
            <i class="fa-solid fa-door-open text-brand-500 mr-2"></i>Các phòng
            đang mở
          </h3>
          <div class="relative w-full sm:w-64">
            <input
              type="text"
              id="search-room"
              class="w-full pl-9 pr-4 py-2 border rounded-full text-sm focus:ring-brand-500 outline-none"
              placeholder="Tìm kiếm phòng..."
              onkeyup="filterRooms()"
            />
            <i
              class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400"
            ></i>
          </div>
        </div>

        <div
          id="room-list"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in"
        >
          <div
            class="col-span-full text-center py-12 text-gray-400"
            id="loading-text"
          >
            <i
              class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-brand-400"
            ></i>
            <p>Đang kết nối vào hệ thống máy chủ EduChem...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- MÀN HÌNH CHAT -->
    <div
      id="screen-chat"
      class="hidden h-full flex-col bg-white w-full max-w-6xl mx-auto shadow-2xl relative chat-bg"
    >
      <!-- Chat Header -->
      <div
        class="bg-white/95 backdrop-blur-sm border-b px-4 py-3 flex justify-between items-center shadow-sm z-10 sticky top-0"
      >
        <div class="flex items-center gap-4">
          <button
            onclick="leaveRoom()"
            class="text-gray-500 hover:text-brand-600 transition-colors w-8 h-8 flex justify-center items-center rounded-full hover:bg-gray-100"
          >
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <div>
            <h3
              id="current-room-name"
              class="font-bold text-gray-800 text-lg flex items-center gap-2"
            >
              Phòng Chat
            </h3>
            <span class="text-xs text-green-500 flex items-center gap-1"
              ><span
                class="w-2 h-2 bg-green-500 rounded-full animate-pulse"
              ></span>
              Đang trực tuyến</span
            >
          </div>
        </div>
        <button
          class="text-gray-400 hover:text-red-500 transition-colors"
          onclick="leaveRoom()"
          title="Thoát phòng"
        >
          <i class="fa-solid fa-right-from-bracket text-xl"></i>
        </button>
      </div>

      <!-- Messages Area -->
      <div
        id="msg-container"
        class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 scroll-smooth"
      >
        <!-- Messages render here -->
      </div>

      <!-- Chemistry Tools (Mới) -->
      <div
        class="bg-gray-50 border-t px-4 py-2 flex gap-2 overflow-x-auto no-scrollbar items-center"
      >
        <span class="text-xs text-gray-500 font-medium whitespace-nowrap mr-2"
          >Gõ nhanh:</span
        >
        <button
          onclick="insertText('H₂O')"
          class="px-2 py-1 bg-white border rounded text-xs hover:bg-brand-50 hover:text-brand-600 transition"
        >
          H₂O
        </button>
        <button
          onclick="insertText('CO₂')"
          class="px-2 py-1 bg-white border rounded text-xs hover:bg-brand-50 hover:text-brand-600 transition"
        >
          CO₂
        </button>
        <button
          onclick="insertText('⇌')"
          class="px-2 py-1 bg-white border rounded text-xs hover:bg-brand-50 hover:text-brand-600 transition"
        >
          ⇌
        </button>
        <button
          onclick="insertText('Δ')"
          class="px-2 py-1 bg-white border rounded text-xs hover:bg-brand-50 hover:text-brand-600 transition"
        >
          Δ
        </button>
        <button
          onclick="insertText('°C')"
          class="px-2 py-1 bg-white border rounded text-xs hover:bg-brand-50 hover:text-brand-600 transition"
        >
          °C
        </button>
        <button
          onclick="insertText('🧪')"
          class="px-2 py-1 bg-white border rounded text-xs hover:bg-brand-50 hover:text-brand-600 transition"
        >
          🧪
        </button>
        <button
          onclick="insertText('🔬')"
          class="px-2 py-1 bg-white border rounded text-xs hover:bg-brand-50 hover:text-brand-600 transition"
        >
          🔬
        </button>
      </div>

      <!-- Chat Input Area -->
      <div class="bg-white border-t p-3 sm:p-4 z-10">
        <!-- File Preview -->
        <div
          id="file-preview"
          class="hidden items-center p-2 mb-2 bg-blue-50 border border-blue-100 rounded-lg max-w-sm animate-fade-in"
        >
          <i class="fa-solid fa-file-lines text-blue-500 text-xl mr-3"></i>
          <div
            class="flex-1 truncate text-sm text-gray-700 font-medium"
            id="preview-name"
          >
            filename.pdf
          </div>
          <button
            onclick="clearFile()"
            class="text-red-400 hover:text-red-600 w-6 h-6 rounded-full hover:bg-red-50 flex items-center justify-center transition-colors"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <form onsubmit="sendMessage(event)" class="flex gap-2 items-end">
          <label
            class="cursor-pointer text-gray-400 hover:text-brand-600 p-3 rounded-full hover:bg-brand-50 transition-colors flex items-center justify-center relative group"
          >
            <i class="fa-solid fa-paperclip text-xl"></i>
            <input
              type="file"
              id="file-input"
              class="hidden"
              onchange="handleFileSelect(this)"
            />
            <span
              class="absolute -top-8 bg-gray-800 text-white text-xs px-2 py-1 rounded hidden group-hover:block whitespace-nowrap"
              >Đính kèm file/ảnh</span
            >
          </label>

          <div
            class="flex-1 bg-gray-100 rounded-2xl flex items-center px-4 py-1 border border-transparent focus-within:border-brand-300 focus-within:bg-white transition-all shadow-inner"
          >
            <input
              id="msg-input"
              type="text"
              class="w-full bg-transparent border-none py-2 outline-none text-gray-700 placeholder-gray-400"
              placeholder="Nhập tin nhắn hoặc bài tập..."
              autocomplete="off"
            />
          </div>

          <button
            type="submit"
            class="bg-brand-600 hover:bg-brand-700 text-white p-3 sm:px-6 rounded-full shadow-md transition-transform transform hover:scale-105 active:scale-95 flex items-center justify-center"
          >
            <i class="fa-solid fa-paper-plane sm:mr-2"></i>
            <span class="hidden sm:inline font-medium">Gửi</span>
          </button>
        </form>
      </div>
    </div>

    <!-- MODAL TẠO PHÒNG -->
    <div
      id="modal-create"
      class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity"
    >
      <div
        class="bg-white p-6 rounded-2xl w-full max-w-sm mx-4 shadow-2xl animate-slide-up transform transition-all"
      >
        <div class="flex justify-between items-center mb-5">
          <h3 class="font-bold text-xl text-gray-800">
            <i class="fa-solid fa-layer-group text-brand-500 mr-2"></i>Tạo phòng
            học mới
          </h3>
          <button
            onclick="toggleModal(false)"
            class="text-gray-400 hover:text-gray-600"
          >
            <i class="fa-solid fa-xmark text-xl"></i>
          </button>
        </div>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Tên phòng *</label
            >
            <input
              id="new-room-name"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 outline-none"
              placeholder="VD: Giải đề Hóa Hữu cơ 12"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Mật khẩu
              <span class="text-gray-400 font-normal"
                >(để trống nếu công khai)</span
              ></label
            >
            <div class="relative">
              <input
                type="password"
                id="new-room-pass"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 outline-none"
                placeholder="••••••••"
              />
              <i
                class="fa-solid fa-lock absolute right-3 top-3.5 text-gray-400"
              ></i>
            </div>
          </div>
          <div class="pt-2 flex justify-end gap-3">
            <button
              onclick="toggleModal(false)"
              class="px-5 py-2.5 rounded-lg text-gray-600 font-medium hover:bg-gray-100 transition-colors"
            >
              Hủy
            </button>
            <button
              onclick="createRoom()"
              class="px-5 py-2.5 bg-brand-600 text-white rounded-lg font-medium shadow hover:bg-brand-700 transition-colors"
            >
              Tạo & Vào phòng
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // KẾT NỐI SOCKET
      const socket = io();

      let myName = "";
      let myAvatar = "";
      let currentRoomId = "";
      let selectedFile = null;
      let roomsData = []; // Lưu trữ để phục vụ tính năng tìm kiếm

      // --- DANH SÁCH AVATAR ---
      const avatars = ["👨‍🔬", "👩‍🔬", "🤓", "👽", "🤖", "👻", "🦊"];

      // Init logic
      window.onload = () => {
        const avatarContainer = document.getElementById("avatar-selector");
        avatars.forEach((emoji, idx) => {
          const btn = document.createElement("button");
          btn.className = `w-12 h-12 text-2xl rounded-full border-2 flex items-center justify-center transition-all hover:scale-110 focus:outline-none ${idx === 0 ? "border-brand-500 bg-brand-50" : "border-transparent bg-gray-100 hover:bg-gray-200"}`;
          btn.innerText = emoji;
          btn.onclick = () => selectAvatar(btn, emoji);
          avatarContainer.appendChild(btn);
        });
        myAvatar = avatars[0]; // Mặc định
      };

      function selectAvatar(btn, emoji) {
        myAvatar = emoji;
        const container = document.getElementById("avatar-selector");
        Array.from(container.children).forEach((child) => {
          child.classList.remove("border-brand-500", "bg-brand-50");
          child.classList.add("border-transparent", "bg-gray-100");
        });
        btn.classList.remove("border-transparent", "bg-gray-100");
        btn.classList.add("border-brand-500", "bg-brand-50");
      }

      // --- KIỂM TRA KẾT NỐI ---
      socket.on("connect", () => {
        document.getElementById("status-bar").classList.add("hidden");
        const loading = document.getElementById("loading-text");
        if (loading)
          loading.innerHTML = `<i class="fa-solid fa-mug-hot text-3xl mb-3 text-gray-300"></i><p>Chưa có phòng nào. Hãy là người đầu tiên tạo phòng!</p>`;
      });

      socket.on("connect_error", (err) => {
        document.getElementById("status-bar").classList.remove("hidden");
      });

      // --- LOGIC GIAO DIỆN CHÍNH ---
      function login() {
        const name = document.getElementById("username").value.trim();
        if (!name) {
          Swal.fire({
            title: "Oops!",
            text: "Vui lòng nhập tên của bạn nhé!",
            icon: "warning",
            confirmButtonColor: "#3b82f6",
          });
          return;
        }
        myName = name;
        document.getElementById("display-name").innerText = `${myName}`;
        document.getElementById("my-avatar-display").innerText = myAvatar;

        // Hiệu ứng chuyển màn hình
        const loginScreen = document.getElementById("screen-login");
        loginScreen.style.opacity = "0";
        setTimeout(() => {
          loginScreen.classList.add("hidden");
          document.getElementById("screen-lobby").classList.remove("hidden");
          document.getElementById("screen-lobby").classList.add("flex");
        }, 500);

        socket.emit("get_initial_rooms");
      }

      function toggleModal(show) {
        const modal = document.getElementById("modal-create");
        if (show) {
          modal.classList.remove("hidden");
        } else {
          modal.classList.add("hidden");
        }
      }

      // --- XỬ LÝ PHÒNG ---
      socket.on("update_rooms", (rooms) => {
        roomsData = rooms;
        renderRooms(rooms);
      });

      function filterRooms() {
        const keyword = document
          .getElementById("search-room")
          .value.toLowerCase();
        const filtered = roomsData.filter((r) =>
          r.name.toLowerCase().includes(keyword),
        );
        renderRooms(filtered);
      }

      function renderRooms(rooms) {
        const list = document.getElementById("room-list");
        list.innerHTML = "";

        if (rooms.length === 0) {
          list.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400">
            <i class="fa-regular fa-folder-open text-4xl mb-3 text-gray-300"></i>
            <p>Không tìm thấy phòng nào.</p>
          </div>`;
          return;
        }

        rooms.forEach((room) => {
          const isPrivate = room.isPrivate;
          const bgClass = isPrivate ? "bg-amber-50" : "bg-white";
          const iconClass = isPrivate
            ? "fa-lock text-amber-500"
            : "fa-hashtag text-brand-500";

          const div = document.createElement("div");
          div.className = `${bgClass} p-5 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all cursor-pointer transform hover:-translate-y-1 relative overflow-hidden group`;
          div.onclick = () => joinRoomRequest(room.id, isPrivate);
          div.innerHTML = `
            <div class="absolute top-0 right-0 w-16 h-16 bg-gradient-to-bl from-gray-100 to-transparent opacity-50 rounded-bl-full"></div>
            <div class="flex justify-between items-start mb-3 relative z-10">
              <div class="w-10 h-10 rounded-full bg-gray-100 flex justify-center items-center group-hover:bg-white transition-colors">
                <i class="fa-solid ${iconClass} text-lg"></i>
              </div>
              <span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-full font-medium"><i class="fa-solid fa-users mr-1 text-gray-400"></i> ${room.count}</span>
            </div>
            <h4 class="font-bold text-gray-800 text-lg mb-1 truncate relative z-10">${room.name}</h4>
            <p class="text-xs text-gray-500 relative z-10">${isPrivate ? "Yêu cầu mật khẩu" : "Tham gia tự do"}</p>
          `;
          list.appendChild(div);
        });
      }

      function createRoom() {
        const name = document.getElementById("new-room-name").value.trim();
        const pass = document.getElementById("new-room-pass").value;
        if (!name) {
          Swal.fire({
            title: "Thiếu thông tin!",
            text: "Vui lòng đặt tên cho phòng nhé.",
            icon: "info",
            confirmButtonColor: "#3b82f6",
          });
          return;
        }

        socket.emit("create_room", { name, password: pass, owner: myName });
        toggleModal(false);
        document.getElementById("new-room-name").value = "";
        document.getElementById("new-room-pass").value = "";
      }

      function joinRoomRequest(roomId, isPrivate) {
        if (isPrivate) {
          Swal.fire({
            title: "Phòng Kín",
            input: "password",
            inputLabel: "Vui lòng nhập mật khẩu",
            inputPlaceholder: "Mật khẩu...",
            showCancelButton: true,
            confirmButtonText: "Vào phòng",
            cancelButtonText: "Hủy",
            confirmButtonColor: "#3b82f6",
          }).then((result) => {
            if (result.isConfirmed) {
              socket.emit("join_room", {
                roomId,
                password: result.value,
                username: myName,
              });
            }
          });
        } else {
          socket.emit("join_room", { roomId, password: "", username: myName });
        }
      }

      // --- XỬ LÝ TRONG PHÒNG ---
      socket.on("join_success", (data) => {
        currentRoomId = data.roomId;
        document.getElementById("current-room-name").innerHTML =
          `<i class="fa-solid fa-hashtag text-brand-500 mr-2"></i>${data.roomName}`;

        document.getElementById("screen-lobby").classList.add("hidden");
        document.getElementById("screen-lobby").classList.remove("flex");
        document.getElementById("screen-chat").classList.remove("hidden");
        document.getElementById("screen-chat").classList.add("flex");

        document.getElementById("msg-container").innerHTML = "";

        // Lời chào hệ thống
        const box = document.getElementById("msg-container");
        box.innerHTML = `
          <div class="text-center my-6">
            <div class="inline-block bg-brand-50 text-brand-600 px-4 py-2 rounded-full text-xs font-medium border border-brand-100">
              Chào mừng bạn đến với ${data.roomName}. Chúc bạn học tốt! 🎉
            </div>
          </div>
        `;

        data.history.forEach(renderMessage);
      });

      socket.on("error_msg", (msg) => {
        Swal.fire({
          title: "Lỗi!",
          text: msg,
          icon: "error",
          confirmButtonColor: "#ef4444",
        });
      });

      function leaveRoom() {
        socket.emit("leave_room", { roomId: currentRoomId, username: myName });
        document.getElementById("screen-chat").classList.add("hidden");
        document.getElementById("screen-chat").classList.remove("flex");
        document.getElementById("screen-lobby").classList.remove("hidden");
        document.getElementById("screen-lobby").classList.add("flex");
        currentRoomId = "";
      }

      // --- CHAT & FILE ---
      function handleFileSelect(input) {
        if (input.files[0]) {
          selectedFile = input.files[0];
          document.getElementById("file-preview").classList.remove("hidden");
          document.getElementById("file-preview").classList.add("flex");

          let fileName = selectedFile.name;
          if (fileName.length > 25)
            fileName = fileName.substring(0, 22) + "...";
          document.getElementById("preview-name").innerText = fileName;

          // Đổi icon theo loại file
          const icon = document.querySelector("#file-preview i");
          if (selectedFile.type.startsWith("image/")) {
            icon.className = "fa-solid fa-image text-brand-500 text-xl mr-3";
          } else if (fileName.endsWith(".pdf")) {
            icon.className = "fa-solid fa-file-pdf text-red-500 text-xl mr-3";
          } else {
            icon.className =
              "fa-solid fa-file-lines text-blue-500 text-xl mr-3";
          }
        }
      }

      function clearFile() {
        selectedFile = null;
        document.getElementById("file-input").value = "";
        document.getElementById("file-preview").classList.add("hidden");
        document.getElementById("file-preview").classList.remove("flex");
      }

      function insertText(text) {
        const input = document.getElementById("msg-input");
        input.value += text;
        input.focus();
      }

      async function sendMessage(e) {
        e.preventDefault();
        const input = document.getElementById("msg-input");
        const content = input.value.trim();

        if (!content && !selectedFile) return;

        let msgData = {
          roomId: currentRoomId,
          username: myName,
          avatar: myAvatar, // Gửi kèm avatar
          content,
          type: "text",
        };

        if (selectedFile) {
          const formData = new FormData();
          formData.append("file", selectedFile);

          // Nút gửi loading state
          const btn = document.querySelector('button[type="submit"]');
          const oldBtnHtml = btn.innerHTML;
          btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
          btn.disabled = true;

          try {
            const res = await fetch("/upload", {
              method: "POST",
              body: formData,
            });
            const data = await res.json();
            if (data.success) {
              msgData.type = data.fileType; // 'image' hoặc 'file'
              msgData.content = data.fileUrl;
              msgData.fileName = data.fileName;
              if (content) msgData.caption = content; // Nếu gửi file kèm chữ
            } else {
              throw new Error("Upload failed");
            }
          } catch (err) {
            Swal.fire({
              title: "Lỗi tải file",
              text: "Có lỗi xảy ra khi tải file lên server.",
              icon: "error",
            });
            btn.innerHTML = oldBtnHtml;
            btn.disabled = false;
            return;
          }
          btn.innerHTML = oldBtnHtml;
          btn.disabled = false;
        }

        socket.emit("send_msg", msgData);
        input.value = "";
        clearFile();
      }

      socket.on("receive_msg", (msg) => renderMessage(msg));

      // Tin nhắn hệ thống (Ra/Vào)
      socket.on("system_msg", (txt) => {
        const box = document.getElementById("msg-container");
        box.insertAdjacentHTML(
          "beforeend",
          `<div class="flex justify-center my-2 animate-fade-in">
            <span class="text-xs bg-gray-100 text-gray-500 px-3 py-1 rounded-full">${txt}</span>
          </div>`,
        );
        box.scrollTop = box.scrollHeight;
      });

      function formatTime() {
        const now = new Date();
        return `${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}`;
      }

      function renderMessage(msg) {
        const box = document.getElementById("msg-container");
        const isMe = msg.username === myName;
        const senderAvatar = msg.avatar || "👤";
        const timeStr = formatTime();

        let contentHtml = "";

        // Sinh giao diện cho nội dung
        if (msg.type === "image") {
          contentHtml = `
            <div class="relative group mt-1">
              <img src="${msg.content}" class="max-w-[240px] sm:max-w-xs rounded-xl shadow-sm border border-gray-200 cursor-pointer object-cover transition-transform hover:opacity-95" onclick="window.open(this.src)">
              <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center rounded-xl pointer-events-none transition-all">
                <i class="fa-solid fa-expand text-white text-2xl"></i>
              </div>
            </div>
            ${msg.caption ? `<p class="mt-2 text-[15px] leading-relaxed">${msg.caption}</p>` : ""}
          `;
        } else if (msg.type === "file") {
          contentHtml = `
            <a href="${msg.content}" target="_blank" class="flex items-center gap-3 bg-white/20 p-3 rounded-xl border ${isMe ? "border-brand-400 hover:bg-brand-500" : "border-gray-200 hover:bg-gray-50"} transition-colors no-underline group mt-1">
              <div class="w-10 h-10 flex items-center justify-center rounded-lg ${isMe ? "bg-white text-brand-600" : "bg-brand-50 text-brand-600"}">
                <i class="fa-solid fa-file-arrow-down text-lg"></i>
              </div>
              <div class="flex-1 overflow-hidden">
                <p class="text-sm font-semibold truncate ${isMe ? "text-white" : "text-gray-800"} group-hover:underline">${msg.fileName}</p>
                <p class="text-xs ${isMe ? "text-brand-100" : "text-gray-500"} uppercase">Nhấn để tải về</p>
              </div>
            </a>
            ${msg.caption ? `<p class="mt-2 text-[15px] leading-relaxed">${msg.caption}</p>` : ""}
          `;
        } else {
          // Text thường
          if (msg.content) {
            // Chuyển link thành thẻ <a> (Cơ bản)
            const textContent = msg.content.replace(
              /(https?:\/\/[^\s]+)/g,
              '<a href="$1" target="_blank" class="underline font-medium hover:opacity-80 break-all">$1</a>',
            );
            contentHtml = `<p class="text-[15px] leading-relaxed break-words">${textContent}</p>`;
          }
        }

        // Bỏ qua nếu tin nhắn rỗng (có thể do lỗi)
        if (msg.type === "text" && !msg.content) return;

        const html = `
          <div class="flex flex-col ${isMe ? "items-end" : "items-start"} animate-fade-in mb-2">
            ${!isMe ? `<div class="text-[11px] font-medium text-gray-500 mb-1 ml-11">${msg.username}</div>` : ""}
            <div class="flex gap-2 max-w-[85%] sm:max-w-[70%] ${isMe ? "flex-row-reverse" : "flex-row"} items-end">
              
              <!-- Avatar -->
              <div class="w-8 h-8 rounded-full flex-shrink-0 bg-gray-100 flex items-center justify-center border border-gray-200 shadow-sm text-sm">
                ${senderAvatar}
              </div>

              <!-- Bong bóng chat -->
              <div class="relative group">
                <div class="px-4 py-2.5 rounded-2xl shadow-sm ${
                  isMe
                    ? "bg-brand-600 text-white rounded-br-sm"
                    : "bg-white text-gray-800 border border-gray-100 rounded-bl-sm"
                }">
                  ${contentHtml}
                </div>
                <!-- Timestamp -->
                <span class="text-[10px] text-gray-400 absolute ${isMe ? "-left-10" : "-right-10"} bottom-1 opacity-0 group-hover:opacity-100 transition-opacity">${timeStr}</span>
              </div>
            </div>
          </div>
        `;

        box.insertAdjacentHTML("beforeend", html);
        box.scrollTop = box.scrollHeight;
      }
    </script>
  </body>
</html>
