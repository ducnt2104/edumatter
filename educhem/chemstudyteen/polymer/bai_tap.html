<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Luyện Đề Trắc Nghiệm</title>
    <link rel="stylesheet" href="bai_tap.css" />
    <link rel="icon" type="image/x-icon" href="../../../favicon/educhem.svg" />
  </head>
  <body>
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="overlay" onclick="toggleSidebar()"></div>
    <div class="app-container">
      <aside class="sidebar">
        <h2>Bảng Điều Hướng</h2>
        <p style="color: #6c757d; font-size: 0.9em; margin-bottom: 10px">
          Click vào số câu để cuộn tới
        </p>

        <h4 style="margin-top: 10px">Phần 1: Trắc nghiệm (16 câu)</h4>
        <div class="nav-grid" id="nav-p1"></div>

        <h4 style="margin-top: 20px">Phần 2: Đúng/Sai (4 câu)</h4>
        <div class="nav-grid" id="nav-p2"></div>

        <h4 style="margin-top: 20px">Phần 3: Trả lời ngắn (4 câu)</h4>
        <div class="nav-grid" id="nav-p3"></div>

        <div id="result-panel">
          <h2 id="total-score">0 / 10</h2>
          <div class="score-breakdown">
            <div>P1: <span id="score-p1">0</span></div>
            <div>P2: <span id="score-p2">0</span></div>
            <div>P3: <span id="score-p3">0</span></div>
          </div>
        </div>

        <button class="btn-submit" id="btn-submit" onclick="submitQuiz()">
          NỘP BÀI
        </button>
        <button
          class="btn btn-submit"
          id="btn-submit"
          onclick="window.location.href = 'cau_tao_nguyen_tu.html'"
        >
          Quay lại bài học
        </button>
      </aside>

      <main class="main-content" id="quiz-container">
        <!-- Nội dung đề sinh tự động bằng JS -->
      </main>
    </div>
    <script src="bai_tap.js"></script>
  </body>
</html>
