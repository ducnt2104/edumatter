<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- ========================================== -->
  <!-- 1. BACKGROUND & DEFINITIONS                -->
  <!-- ========================================== -->
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <!-- Gradient gốc cho vòng ngoài -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Gradient tạo độ sâu cho cánh hoa (giữ nguyên gốc) -->
    <linearGradient id="petalGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.12)"/>
    </linearGradient>

    <!-- Gradient cho thanh tương tác pH -->
    <linearGradient id="pHgradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/> <!-- Axit -->
      <stop offset="50%" stop-color="#22c55e"/> <!-- Trung tính -->
      <stop offset="100%" stop-color="#3b82f6"/> <!-- Bazơ -->
    </linearGradient>

    <!-- Hiệu ứng Glow (Tạo ánh sáng digital mượt mà) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Hiệu ứng viền phát sáng nhẹ cho các hạt electron -->
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>


  <!-- ========================================== -->
  <!-- 2. NETWORK NODES (Yếu tố mindmap nền)      -->
  <!-- ========================================== -->
  <!-- Đa giác lục giác kết nối các cánh hoa tạo cảm giác mạng lưới dữ liệu -->
  <polygon points="256,91 398.9,173.5 398.9,338.5 256,421 113.1,338.5 113.1,173.5" 
           fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.25"/>


  <!-- ========================================== -->
  <!-- 3. OUTER RING (Data / Digital / Glow)      -->
  <!-- ========================================== -->
  <!-- Vòng ánh sáng mờ (Glow effect) -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="url(#ring)" stroke-width="14" opacity="0.2" filter="url(#glow)"/>
  
  <!-- Vòng khung chính thức -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.8"/>
  
  <!-- Vòng tín hiệu đứt đoạn (Digital Data Track) -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.6"/>
  
  <!-- Vòng outer wave (Sóng năng lượng bên ngoài) -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2 12" opacity="0.4"/>


  <!-- ========================================== -->
  <!-- 4. MACRO ELECTRON ORBITS                   -->
  <!-- ========================================== -->
  <!-- Quỹ đạo lớn xoay quanh lõi trung tâm, xuyên qua các cánh hoa -->
  <ellipse cx="256" cy="256" rx="65" ry="205" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4 4" opacity="0.4" transform="rotate(30 256 256)"/>
  <ellipse cx="256" cy="256" rx="65" ry="205" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4 4" opacity="0.4" transform="rotate(90 256 256)"/>
  <ellipse cx="256" cy="256" rx="65" ry="205" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4 4" opacity="0.4" transform="rotate(150 256 256)"/>


  <!-- ========================================== -->
  <!-- 5. PETALS (Giữ nguyên cấu trúc xoay gốc)   -->
  <!-- ========================================== -->
  <g transform="translate(256,256)">
      <!-- Petal 1 -->
      <g transform="rotate(0)">
        <path d="M0,-165 A165,165 0 0 1 140,-82 L60,-35 A92,92 0 0 0 0,-90Z" fill="#3b82f6"/>
        <path d="M0,-165 A165,165 0 0 1 140,-82 L60,-35 A92,92 0 0 0 0,-90Z" fill="url(#petalGradient)" opacity="0.55"/>
      </g>
      <!-- Petal 2 -->
      <g transform="rotate(60)">
        <path d="M0,-165 A165,165 0 0 1 140,-82 L60,-35 A92,92 0 0 0 0,-90Z" fill="#06b6d4"/>
        <path d="M0,-165 A165,165 0 0 1 140,-82 L60,-35 A92,92 0 0 0 0,-90Z" fill="url(#petalGradient)" opacity="0.55"/>
      </g>
      <!-- Petal 3 -->
      <g transform="rotate(120)">
        <path d="M0,-165 A165,165 0 0 1 140,-82 L60,-35 A92,92 0 0 0 0,-90Z" fill="#0ea5e9"/>
        <path d="M0,-165 A165,165 0 0 1 140,-82 L60,-35 A92,92 0 0 0 0,-90Z" fill="url(#petalGradient)" opacity="0.55"/>
      </g>
      <!-- Petal 4 -->
      <g transform="rotate(180)">
        <path d="M0,-165 A165,165 0 0 1 140,-82 L60,-35 A92,92 0 0 0 0,-90Z" fill="#38bdf8"/>
        <path d="M0,-165 A165,165 0 0 1 140,-82 L60,-35 A92,92 0 0 0 0,-90Z" fill="url(#petalGradient)" opacity="0.55"/>
      </g>
      <!-- Petal 5 -->
      <g transform="rotate(240)">
        <path d="M0,-165 A165,165 0 0 1 140,-82 L60,-35 A92,92 0 0 0 0,-90Z" fill="#60a5fa"/>
        <path d="M0,-165 A165,165 0 0 1 140,-82 L60,-35 A92,92 0 0 0 0,-90Z" fill="url(#petalGradient)" opacity="0.55"/>
      </g>
      <!-- Petal 6 -->
      <g transform="rotate(300)">
        <path d="M0,-165 A165,165 0 0 1 140,-82 L60,-35 A92,92 0 0 0 0,-90Z" fill="#2563eb"/>
        <path d="M0,-165 A165,165 0 0 1 140,-82 L60,-35 A92,92 0 0 0 0,-90Z" fill="url(#petalGradient)" opacity="0.55"/>
      </g>
  </g>


  <!-- ========================================== -->
  <!-- 6. INNER CIRCLE (Depth & Base)             -->
  <!-- ========================================== -->
  <!-- Shadow tạo chiều sâu (Layer opacity) -->
  <circle cx="256" cy="256" r="115" fill="#0f172a" filter="url(#glow)" opacity="0.12"/>
  
  <!-- Hình tròn trung tâm -->
  <circle cx="256" cy="256" r="115" fill="#ffffff" stroke="#e2e8f0" stroke-width="4"/>
  
  <!-- Vạch digital trang trí bên trong -->
  <circle cx="256" cy="256" r="106" fill="none" stroke="#f1f5f9" stroke-width="2" stroke-dasharray="4 6"/>


  <!-- ========================================== -->
  <!-- 7. CENTER ICON (Orbital Atom model)        -->
  <!-- ========================================== -->
  <g transform="translate(256, 172)">
      <circle cx="0" cy="0" r="4" fill="#3b82f6" filter="url(#glow)"/>
      <g transform="rotate(30)">
        <ellipse cx="0" cy="0" rx="8" ry="24" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
        <circle cx="0" cy="-24" r="2.5" fill="#0ea5e9"/>
      </g>
      <g transform="rotate(90)">
        <ellipse cx="0" cy="0" rx="8" ry="24" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
        <circle cx="0" cy="24" r="2.5" fill="#3b82f6"/>
      </g>
      <g transform="rotate(150)">
        <ellipse cx="0" cy="0" rx="8" ry="24" fill="none" stroke="#2563eb" stroke-width="1.5"/>
        <circle cx="8" cy="0" r="2.5" fill="#06b6d4"/>
      </g>
  </g>


  <!-- ========================================== -->
  <!-- 8. LOGO TEXT & SUBTITLE                    -->
  <!-- ========================================== -->
  <text x="256" y="228" font-family="Segoe UI, Roboto, sans-serif" font-size="34" font-weight="800" fill="#0f172a" text-anchor="middle" letter-spacing="1">
    EDUCHEM
  </text>

  <text x="256" y="254" font-family="Segoe UI, Roboto, sans-serif" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="1.5">
    LEARN • EXPERIMENT • EXPLORE
  </text>

  <!-- Digital Divider -->
  <line x1="180" y1="272" x2="332" y2="272" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="256" cy="272" r="3.5" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>


  <!-- ========================================== -->
  <!-- 9. CHEMISTRY UI ICONS (Modern, Clean)      -->
  <!-- ========================================== -->
  
  <!-- H2O Icon (Trái) -->
  <g transform="translate(175, 312) scale(0.95)">
      <line x1="0" y1="0" x2="-14" y2="10" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="14" y2="10" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="7" fill="#ef4444"/> <!-- Oxygen -->
      <circle cx="-14" cy="10" r="5" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/> <!-- Hydrogen -->
      <circle cx="14" cy="10" r="5" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  </g>

  <!-- Reaction Arrow 1 -->
  <g transform="translate(208, 312)">
      <line x1="0" y1="0" x2="14" y2="0" stroke="#cbd5e1" stroke-width="2"/>
      <polygon points="14,-3.5 19,0 14,3.5" fill="#cbd5e1"/>
  </g>

  <!-- Benzene Ring (Giữa) -->
  <g transform="translate(248, 312) scale(0.85)">
      <!-- Lục giác đều chuẩn xác -->
      <polygon points="0,-16 13.86,-8 13.86,8 0,16 -13.86,8 -13.86,-8" fill="none" stroke="#0ea5e9" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Vòng delocalized hiện đại (nét đứt) -->
      <circle cx="0" cy="0" r="9" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="3 3"/>
  </g>

  <!-- Interactive Data Arrow 2 -->
  <g transform="translate(276, 312)">
      <line x1="0" y1="0" x2="14" y2="0" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="3 2"/>
      <polygon points="14,-3.5 19,0 14,3.5" fill="#cbd5e1"/>
  </g>

  <!-- pH Scale Slider (Phải) -->
  <g transform="translate(306, 309)">
      <rect x="0" y="-3" width="28" height="6" rx="3" fill="url(#pHgradient)"/>
      <text x="14" y="14" font-family="Segoe UI, Roboto, sans-serif" font-size="8" font-weight="700" fill="#64748b" text-anchor="middle">pH 5</text>
  </g>


  <!-- ========================================== -->
  <!-- 10. INTERACTIVE ELEMENTS (Cursor, Ripples) -->
  <!-- ========================================== -->
  
  <!-- Các hạt data/electron bay quanh UI -->
  <g filter="url(#subtleGlow)">
      <circle cx="120" cy="140" r="3" fill="#0ea5e9"/>
      <circle cx="390" cy="130" r="2" fill="#38bdf8"/>
      <circle cx="430" cy="280" r="3.5" fill="#3b82f6"/>
      <circle cx="95" cy="360" r="2.5" fill="#06b6d4"/>
      <circle cx="360" cy="410" r="3" fill="#2563eb"/>
  </g>
  
  <!-- Ký hiệu UI "+" tinh tế ở background -->
  <g stroke="#94a3b8" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
      <path d="M70,250 L80,250 M75,245 L75,255"/>
      <path d="M410,180 L420,180 M415,175 L415,185"/>
  </g>

  <!-- Click Ripples tại điểm tương tác (Thanh trượt pH) -->
  <!-- Tọa độ gốc: 306(pH_x) + 8(slider_cx) = 314, 309(pH_y) + 0(slider_cy) = 309 -->
  <g transform="translate(314, 309)">
      <circle cx="0" cy="0" r="6" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
      <circle cx="0" cy="0" r="12" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.4"/>
      <circle cx="0" cy="0" r="18" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.1"/>
  </g>

  <!-- Trỏ chuột máy tính (Cursor) -->
  <g transform="translate(314, 309) scale(0.9)">
      <!-- Vạch trượt (Slider Thumb) của thanh pH -->
      <circle cx="0" cy="0" r="4.5" fill="#ffffff" stroke="#1e293b" stroke-width="1.5"/>
      
      <!-- Hình dạng Cursor chuẩn -->
      <path d="M0,0 L0,16 L4,12 L9,20 L12,18 L7,10 L14,10 Z" fill="#ffffff" stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

</svg>