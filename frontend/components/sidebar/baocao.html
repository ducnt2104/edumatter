<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Gửi Báo Cáo - EDUMATTER</title>
    <link rel="icon" href="../favicon/edumatter.svg?v=1" type="image/svg+xml" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"
    ></script>
    <link rel="stylesheet" href="baocao.css" />
  </head>
  <body>
    <header id="header">
      <div class="brand-group">
        <div class="site-title">EDUMATTER</div>
      </div>
      <a href="../index.html" class="home-btn" aria-label="Về trang chủ">
        <i class="fa-solid fa-house"></i>
      </a>
    </header>

    <div class="hero">
      <h2>Trung tâm hỗ trợ</h2>
      <p>Gặp sự cố? Hãy báo cáo ngay để chúng tôi hỗ trợ bạn.</p>
    </div>

    <div class="container">
      <form id="contact-form">
        <div class="form-group">
          <label>Họ và tên</label>
          <input type="text" name="user_name" placeholder="Nhập tên của bạn" />
        </div>

        <div class="form-group">
          <label>Email liên hệ <span style="color: #ef4444">*</span></label>
          <input
            type="email"
            name="user_email"
            placeholder="name@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label>Loại yêu cầu</label>
          <div class="select-wrapper">
            <select name="report_type" required>
              <option value="Góp ý cải thiện">💡 Góp ý cải thiện</option>
              <option value="Báo lỗi Website">🐛 Báo lỗi Website</option>
              <option value="Nội dung sai sót">📚 Nội dung sai sót</option>
              <option value="Vi phạm">⚠️ Báo cáo vi phạm</option>
              <option value="Khác">💬 Khác</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Nội dung chi tiết <span style="color: #ef4444">*</span></label>
          <textarea
            name="message"
            placeholder="Mô tả vấn đề bạn đang gặp phải..."
            required
          ></textarea>
        </div>

        <button type="submit" class="btn-submit">
          <span>Gửi Báo Cáo</span> <i class="fa-regular fa-paper-plane"></i>
        </button>
      </form>
    </div>

    <div id="toast" class="toast">
      <i class="fa-solid fa-circle-check"></i>
      <div class="toast-content">
        <span id="toast-msg">Gửi thành công!</span>
      </div>
    </div>

    <footer id="footer">
      <p>© 2025 Edumatter</p>
      <div class="footer-links">
        <a href="#"><i class="fa-solid fa-arrow-up"></i> Đầu trang</a>
        <a href="../index.html"><i class="fa-solid fa-house"></i> Trang chủ</a>
      </div>
    </footer>

    <script src="baocao.js"></script>
  </body>
</html>
