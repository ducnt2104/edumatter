                simType: "renewable_lab", // Combined Solar, Wind, Hydro

                  {

                quiz: [

                    options: [

            req: "hero",
          },
          {
            id: "b2",
            name: "Nhà Sinh Học",

            desc: "Hoàn thành Lab Quang Hợp",
            req: "s3",
          },
          {
            id: "b3",

            req: "s10",
          },
          {

      // --- 2. STATE MANAGEMENT ---
      const State = {
        currentSection: "hero",
        xp: 0,
        level: 1,
        completedSections: [],
        unlockedBadges: [],

        load() {
          const saved = localStorage.getItem("edumatter_phys9_state");
          if (saved) {
            const data = JSON.parse(saved);
            this.xp = data.xp || 0;
            this.level = data.level || 1;
            this.completedSections = data.completedSections || [];
            this.unlockedBadges = data.unlockedBadges || [];
          }
          this.updateUI();
        },

        save() {
          localStorage.setItem(
            "edumatter_phys9_state",
            JSON.stringify({
              xp: this.xp,
              level: this.level,
              completedSections: this.completedSections,
              unlockedBadges: this.unlockedBadges,
            }),
          );
        },

        addXP(amount, reason) {
          this.xp += amount;
          const nextLevelXP = this.level * 1000;

          App.showToast(`+${amount} XP: ${reason}`, "success");

          if (this.xp >= nextLevelXP) {
            this.level++;
            this.xp -= nextLevelXP;
            App.showToast(`🎉 LÊN CẤP ${this.level}!`, "achievement");
            // Add some confetti logic here if time permits
          }
          this.save();
          this.updateUI();
        },

        markSectionComplete(id) {
          if (!this.completedSections.includes(id)) {
            this.completedSections.push(id);
            this.addXP(200, "Hoàn thành bài học");
            this.checkBadges(id);

            // Re-render nav to show checkmarks
            App.renderNavigation();
          }
        },

        checkBadges(contextStr) {
          COURSE_DATA.badges.forEach((badge) => {
            if (!this.unlockedBadges.includes(badge.id)) {
              if (badge.req === contextStr) {
                this.unlockedBadges.push(badge.id);
                App.showToast(
                  `🏆 Mở khóa huy hiệu: ${badge.name}`,
                  "achievement",
                );
                document
                  .getElementById("badge-notify")
                  .classList.remove("hidden");
                this.save();
              }
            }
          });
        },

        updateUI() {
          document.getElementById("user-level").textContent = this.level;
          document.getElementById("user-xp").textContent = this.xp;
          document.getElementById("user-next-xp").textContent =
            this.level * 1000;
          const pct = (this.xp / (this.level * 1000)) * 100;
          document.getElementById("xp-bar").style.width = `${pct}%`;
        },
      };

      // --- 3. UI COMPONENTS & RENDERING ENGINE ---
      const UI = {
        createCard(title, content, classes = "") {
          return `
                    <div class="glass-panel p-6 rounded-2xl ${classes} mb-6 transform transition-all hover:scale-[1.01] duration-300">
                        ${title ? `<h3 class="text-xl font-display font-bold mb-4 text-primary">${title}</h3>` : ""}
                        <div class="text-slate-700 dark:text-slate-300 leading-relaxed">${content}</div>
                    </div>
                `;
        },

        createQuiz(sectionId, quizData) {
          if (!quizData || quizData.length === 0) return "";
          const q = quizData[0]; // Take first for simplicity in this demo

          let optionsHtml = q.options
            .map(
              (opt, idx) => `
                    <button onclick="Simulations.checkQuiz('${sectionId}', ${idx}, ${q.correct})" 
                            class="w-full text-left p-4 rounded-xl border border-slate-300 dark:border-dark_border bg-white/5 dark:bg-black/20 hover:bg-primary/10 hover:border-primary transition-colors quiz-opt-${sectionId}">
                        ${String.fromCharCode(65 + idx)}. ${opt}
                    </button>
                `,
            )
            .join("");

          return this.createCard(
            "Kiểm tra nhanh",
            `
                    <p class="mb-4 font-medium text-lg">${q.q}</p>
                    <div class="space-y-3" id="quiz-container-${sectionId}">
                        ${optionsHtml}
                    </div>
                    <div id="quiz-result-${sectionId}" class="mt-4 font-bold text-center hidden"></div>
                `,
            "border-l-4 border-l-accent",
          );
        },
      };

      // --- 4. SIMULATION ENGINE (The core logic for physics/visuals) ---
      const Simulations = {
        instances: {}, // Store chart instances to destroy them later
        intervals: {}, // Store animation intervals

        clearCurrent() {
          // Cleanup function when switching sections
          Object.values(this.instances).forEach((inst) => {
            if (inst.destroy) inst.destroy();
          });
          this.instances = {};
          Object.values(this.intervals).forEach(clearInterval);
          this.intervals = {};
        },

        checkQuiz(sectionId, selectedIdx, correctIdx) {
          const container = document.getElementById(
            `quiz-container-${sectionId}`,
          );
          const result = document.getElementById(`quiz-result-${sectionId}`);
          const opts = container.querySelectorAll(`button`);

        initHeroCanvas() {
          const canvas = document.getElementById("hero-canvas");
          const ctx = canvas.getContext("2d");
          let width = (canvas.width = window.innerWidth);
          let height = (canvas.height = window.innerHeight);
          let particles = [];

          window.addEventListener("resize", () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
          });

          for (let i = 0; i < 50; i++) {
            particles.push({
              x: Math.random() * width,
              y: Math.random() * height,
              radius: Math.random() * 2 + 1,
              color: Math.random() > 0.5 ? "#10b981" : "#3b82f6",
              vx: (Math.random() - 0.5) * 0.5,
              vy: (Math.random() - 0.5) * 0.5,
            });
          }

          function animate() {
            ctx.clearRect(0, 0, width, height);

            // Draw connections
            for (let i = 0; i < particles.length; i++) {
              for (let j = i + 1; j < particles.length; j++) {
                let dx = particles[i].x - particles[j].x;
                let dy = particles[i].y - particles[j].y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 150) {
                  ctx.beginPath();
                  ctx.strokeStyle = `rgba(59, 130, 246, ${0.2 * (1 - dist / 150)})`;
                  ctx.lineWidth = 1;
                  ctx.moveTo(particles[i].x, particles[i].y);
                  ctx.lineTo(particles[j].x, particles[j].y);
                  ctx.stroke();
                }
              }
            }

            // Draw particles
            particles.forEach((p) => {
              p.x += p.vx;
              p.y += p.vy;
              if (p.x < 0 || p.x > width) p.vx *= -1;
              if (p.y < 0 || p.y > height) p.vy *= -1;

              ctx.beginPath();
              ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
              ctx.fillStyle = p.color;
              ctx.fill();
            });

            Simulations.intervals["hero_canvas"] =
              requestAnimationFrame(animate);
          }
          animate();
        },

                            <a href="#${sec.id}" onclick="App.navigateTo('${sec.id}')" 
                               class="flex items-center justify-between px-3 py-2 rounded-lg transition-colors cursor-pointer text-sm
                                      ${isActive ? "bg-primary/20 text-primary font-bold" : "text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800/50"}">
                                <span class="truncate">${sec.title}</span>
                                ${isCompleted ? '<i data-lucide="check-circle" size="14" class="text-primary shrink-0"></i>' : ""}
                            </a>
                        `;
            });
            nav.innerHTML += html;
          });
          lucide.createIcons();
        },

        navigateTo(sectionId) {
          State.currentSection = sectionId;
          window.location.hash = sectionId;
          this.renderNavigation();

          // Hide sidebar on mobile after click
          if (window.innerWidth < 768) {
            toggleSidebar();
          }

          const container = document.getElementById("content-container");
          container.innerHTML = ""; // Clear current
          Simulations.clearCurrent(); // Clean up memory

          // Find section data
          let sectionData = null;
          for (let chap of COURSE_DATA.chapters) {
            const found = chap.sections.find((s) => s.id === sectionId);
            if (found) {
              sectionData = found;
              break;
            }
          }

          if (!sectionData) {
            container.innerHTML = `<div class="text-center text-red-500 mt-20">Lỗi: Không tìm thấy nội dung bài học.</div>`;
            return;
          }

          // Update Header Title
          document.getElementById("header-title").innerText =
            sectionData.title.toUpperCase();

          // Build View based on section type
          if (sectionData.type === "hero") {
            Simulations.render_hero(container);
            return; // Hero handles its own layout
          }

          // Standard Layout Build
          let viewHTML = document.createElement("div");
          viewHTML.className = "animate-[fade-in_0.5s_ease-out]";

          // 1. Theory Block
          if (sectionData.theory) {
            viewHTML.innerHTML += UI.createCard(
              `<i data-lucide="book-open" class="inline mr-2"></i> Khái niệm cốt lõi`,
              `<p class="text-lg">${sectionData.theory}</p>`,
              "border-l-4 border-l-primary",
            );
          }

          // 2. Simulation Container
          if (sectionData.simType) {
            const simWrap = document.createElement("div");
            simWrap.id = `sim-wrapper-${sectionData.id}`;
            viewHTML.appendChild(simWrap);

            // Append HTML to DOM first, then call render so specific scripts can find IDs
            container.appendChild(viewHTML);

            const simContainer = document.getElementById(
              `sim-wrapper-${sectionData.id}`,
            );
            if (Simulations[`render_${sectionData.simType}`]) {
              Simulations[`render_${sectionData.simType}`](simContainer);
            } else {
              simContainer.innerHTML = `<div class="p-4 border border-dashed border-slate-500 text-center text-slate-400 rounded-xl mb-6">Mô phỏng <b>${sectionData.simType}</b> đang được nạp...</div>`;
            }
          } else {
            container.appendChild(viewHTML);
          }

          // 3. Quiz Block
          if (sectionData.quiz) {
            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = UI.createQuiz(sectionData.id, sectionData.quiz);
            container.appendChild(tempDiv.firstElementChild);
          }

          // Scroll to top
          document.getElementById("main-scroll").scrollTop = 0;
          lucide.createIcons();
        },

        showModal(id) {
          const modal = document.getElementById(id);
          const content = document.getElementById(id + "-content");
          modal.classList.remove("hidden");
          // Trigger reflow
          void modal.offsetWidth;
          modal.classList.remove("opacity-0");
          content.classList.remove("scale-95");

          if (id === "achievement-modal") {
            document.getElementById("badge-notify").classList.add("hidden");
          }
        },

        hideModal(id) {
          const modal = document.getElementById(id);
          const content = document.getElementById(id + "-content");
          modal.classList.add("opacity-0");
          content.classList.add("scale-95");
          setTimeout(() => modal.classList.add("hidden"), 300);
        },

        showToast(message, type = "info") {
          const container = document.getElementById("toast-container");
          const toast = document.createElement("div");

          let bgColor = "bg-slate-800";
          let iconColor = "text-blue-400";
          let iconStr = "info";

          if (type === "success") {
            bgColor = "bg-emerald-900";
            iconColor = "text-emerald-400";
            iconStr = "check-circle";
          }
          if (type === "error") {
            bgColor = "bg-red-900";
            iconColor = "text-red-400";
            iconStr = "alert-triangle";
          }
          if (type === "achievement") {
            bgColor = "bg-amber-900";
            iconColor = "text-amber-400";
            iconStr = "award";
          }

          toast.className = `${bgColor} border border-slate-700 text-white px-4 py-3 rounded-lg shadow-xl flex items-center gap-3 toast-enter max-w-sm`;
          toast.innerHTML = `<i data-lucide="${iconStr}" class="${iconColor}"></i> <div class="font-medium text-sm">${message}</div>`;

          container.appendChild(toast);
          lucide.createIcons();

          // Animate in
          requestAnimationFrame(() => {
            toast.classList.remove("toast-enter");
            toast.classList.add("toast-active");
          });

          // Remove after 3s
          setTimeout(() => {
            toast.classList.remove("toast-active");
            toast.classList.add("toast-exit");
            setTimeout(() => toast.remove(), 300);
          }, 3000);
        },
      };

      // UI Helpers
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        if (sidebar.classList.contains("-translate-x-full")) {
          sidebar.classList.remove("-translate-x-full");
        } else {
          sidebar.classList.add("-translate-x-full");
        }
      }

      // Add CSS keyframes for fade in
      const style = document.createElement("style");
      style.innerHTML = `
            @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        `;
      document.head.appendChild(style);

      // Bootstrap
      document.addEventListener("DOMContentLoaded", () => App.init());
    </script>
  </body>
</html>
