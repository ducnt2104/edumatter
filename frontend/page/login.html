<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | EduMatter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #f8fafc;
      }
      .glass {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .otp-input {
        width: 3.5rem;
        height: 4rem;
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        border: 2px solid #e2e8f0;
        border-radius: 1rem;
        transition: all 0.2s;
      }
      .otp-input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        outline: none;
        transform: translateY(-2px);
      }
      .step-hidden {
        display: none;
      }
      .loader {
        width: 20px;
        height: 20px;
        border: 3px solid #fff;
        border-bottom-color: transparent;
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
      }
      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }
      .shake {
        animation: shake 0.3s ease-in-out;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-6 bg-slate-100">
    <div
      class="max-w-[440px] w-full glass p-10 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] relative overflow-hidden"
    >
      <!-- Logo & Header -->
      <div class="text-center mb-10">
        <div
          class="w-20 h-20 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-200 rotate-3"
        >
          <i class="fas fa-graduation-cap text-white text-3xl"></i>
        </div>
        <h1
          class="text-3xl font-extrabold text-slate-800 tracking-tight"
          id="main-title"
        >
          Chào mừng bạn
        </h1>
        <p class="text-slate-500 mt-2 font-medium" id="main-subtitle">
          Nhập email để tiếp tục học tập
        </p>
      </div>

      <!-- Toast Notification (Custom Alert) -->
      <div
        id="status-toast"
        class="hidden mb-6 p-4 rounded-2xl text-sm font-semibold flex items-center gap-3"
      >
        <i id="status-icon" class="fas"></i>
        <span id="status-text"></span>
      </div>

      <!-- BƯỚC 1: NHẬP EMAIL -->
      <div id="step-email" class="space-y-6">
        <div class="relative">
          <label
            class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block"
            >Địa chỉ Email</label
          >
          <div class="relative">
            <i
              class="far fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"
            ></i>
            <input
              type="email"
              id="email-input"
              class="w-full pl-12 pr-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 focus:bg-white outline-none transition-all font-medium text-slate-700"
              placeholder="ten-cua-ban@gmail.com"
            />
          </div>
        </div>
        <button
          onclick="sendOTP()"
          id="btn-send-email"
          class="group w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98] flex items-center justify-center gap-2"
        >
          <span id="btn-text-email">Gửi mã xác nhận</span>
          <div id="loader-email" class="loader hidden"></div>
          <i
            id="arrow-email"
            class="fas fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"
          ></i>
        </button>
        <p class="text-center text-xs text-slate-400 font-medium">
          Nếu bạn chưa có tài khoản, hệ thống sẽ tự động đăng ký mới cho bạn.
        </p>
      </div>

      <!-- BƯỚC 2: NHẬP OTP -->
      <div id="step-otp" class="step-hidden space-y-8">
        <div class="text-center">
          <p class="text-sm font-medium text-slate-500 mb-6">
            Mã xác nhận đã được gửi tới:<br />
            <span id="target-email" class="text-indigo-600 font-bold"></span>
          </p>
          <div class="flex justify-between gap-2" id="otp-container">
            <input
              type="text"
              maxlength="1"
              class="otp-input"
              oninput="moveNext(this, 0)"
              onkeydown="moveBack(event, 0)"
            />
            <input
              type="text"
              maxlength="1"
              class="otp-input"
              oninput="moveNext(this, 1)"
              onkeydown="moveBack(event, 1)"
            />
            <input
              type="text"
              maxlength="1"
              class="otp-input"
              oninput="moveNext(this, 2)"
              onkeydown="moveBack(event, 2)"
            />
            <input
              type="text"
              maxlength="1"
              class="otp-input"
              oninput="moveNext(this, 3)"
              onkeydown="moveBack(event, 3)"
            />
            <input
              type="text"
              maxlength="1"
              class="otp-input"
              oninput="moveNext(this, 4)"
              onkeydown="moveBack(event, 4)"
            />
            <input
              type="text"
              maxlength="1"
              class="otp-input"
              oninput="moveNext(this, 5)"
              onkeydown="moveBack(event, 5)"
            />
          </div>
        </div>

        <button
          onclick="verifyOTP()"
          id="btn-verify"
          class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-2xl shadow-lg shadow-emerald-200 transition-all flex items-center justify-center gap-2"
        >
          <span id="btn-text-verify">Xác nhận & Vào lớp</span>
          <div id="loader-verify" class="loader hidden"></div>
        </button>

        <div class="text-center">
          <p class="text-sm text-slate-400 font-medium">Không nhận được mã?</p>
          <button
            id="resend-timer"
            disabled
            class="mt-2 text-indigo-600 font-bold disabled:text-slate-300 disabled:cursor-not-allowed transition-colors"
            onclick="sendOTP()"
          >
            Gửi lại mã sau <span id="timer-sec">60</span>s
          </button>
        </div>

        <button
          onclick="goBack()"
          class="w-full text-sm font-bold text-slate-400 hover:text-slate-600 transition-all flex items-center justify-center gap-2"
        >
          <i class="fas fa-chevron-left text-[10px]"></i> Quay lại nhập email
        </button>
      </div>

      <div class="mt-12 pt-8 border-t border-slate-100 text-center">
        <p class="text-xs text-slate-400 leading-relaxed font-medium">
          Sử dụng EduMatter đồng nghĩa với việc đồng ý với <br />
          <a href="#" class="text-indigo-500 hover:underline">Điều khoản</a> và
          <a href="#" class="text-indigo-500 hover:underline"
            >Chính sách bảo mật</a
          >.
        </p>
      </div>
    </div>

    <script>
      const statusToast = document.getElementById("status-toast");
      const statusText = document.getElementById("status-text");
      const statusIcon = document.getElementById("status-icon");
      let timerInterval;

      // Hiển thị thông báo (thay cho alert)
      function showStatus(msg, type = "error") {
        statusToast.className = `mb-6 p-4 rounded-2xl text-sm font-semibold flex items-center gap-3 ${type === "success" ? "bg-emerald-50 text-emerald-600" : "bg-red-50 text-red-600"}`;
        statusIcon.className = `fas ${type === "success" ? "fa-check-circle" : "fa-exclamation-circle"}`;
        statusText.textContent = msg;
        statusToast.classList.remove("hidden");

        if (type === "error") {
          document.querySelector(".glass").classList.add("shake");
          setTimeout(
            () => document.querySelector(".glass").classList.remove("shake"),
            500,
          );
        }
      }

      // Bước 1: Gửi mã OTP
      async function sendOTP() {
        const email = document.getElementById("email-input").value.trim();
        if (!email || !email.includes("@"))
          return showStatus("Vui lòng nhập email hợp lệ!");

        toggleLoading("email", true);

        try {
          const response = await fetch("/api/auth/send-otp", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          const data = await response.json();

          if (data.success) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));

            showStatus("Xác thực thành công! Đang vào lớp...", "success");
            // Chuyển hướng sang trang forum sau 1 giây
            setTimeout(() => (window.location.href = "/forum"), 1000);
          } else {
            showStatus(data.message || "Mã OTP không chính xác");
            // Reset các ô nhập mã nếu sai
            inputs.forEach((input) => (input.value = ""));
            inputs[0].focus();
          }
        } catch (err) {
          showStatus("Lỗi xác thực. Vui lòng thử lại!");
        } finally {
          toggleLoading("verify", false);
        }
      }

      // --- TIỆN ÍCH UI ---

      // Tự động nhảy ô khi gõ OTP
      function moveNext(input, index) {
        if (input.value && index < 5) {
          document.querySelectorAll(".otp-input")[index + 1].focus();
        }
        if (input.value.length > 1) input.value = input.value.slice(0, 1);
      }

      // Xóa lùi về ô trước
      function moveBack(event, index) {
        if (event.key === "Backspace" && !event.target.value && index > 0) {
          document.querySelectorAll(".otp-input")[index - 1].focus();
        }
      }

      function toggleLoading(btnType, isLoading) {
        const btn =
          btnType === "email"
            ? document.getElementById("btn-send-email")
            : document.getElementById("btn-verify");
        const text =
          btnType === "email"
            ? document.getElementById("btn-text-email")
            : document.getElementById("btn-text-verify");
        const loader =
          btnType === "email"
            ? document.getElementById("loader-email")
            : document.getElementById("loader-verify");
        const icon = document.getElementById("arrow-email");

        if (isLoading) {
          btn.classList.add("opacity-80", "cursor-not-allowed");
          text.classList.add("hidden");
          loader.classList.remove("hidden");
          if (icon) icon.classList.add("hidden");
        } else {
          btn.classList.remove("opacity-80", "cursor-not-allowed");
          text.classList.remove("hidden");
          loader.classList.add("hidden");
          if (icon) icon.classList.remove("hidden");
        }
      }

      function startResendTimer() {
        let timeLeft = 60;
        const resendBtn = document.getElementById("resend-timer");
        const secSpan = document.getElementById("timer-sec");

        resendBtn.disabled = true;
        clearInterval(timerInterval);

        timerInterval = setInterval(() => {
          timeLeft--;
          secSpan.innerText = timeLeft;
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            resendBtn.disabled = false;
            resendBtn.innerHTML = "Gửi lại mã ngay";
          }
        }, 1000);
      }

      function goBack() {
        document.getElementById("step-otp").classList.add("step-hidden");
        document.getElementById("step-email").classList.remove("step-hidden");
        document.getElementById("main-title").innerText = "Chào mừng bạn";
        document.getElementById("main-subtitle").innerText =
          "Nhập email để tiếp tục học tập";
        statusToast.classList.add("hidden");
      }
    </script>
  </body>
</html>
