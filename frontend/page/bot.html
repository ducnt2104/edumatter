<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduBot - Cyber Academic AI</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-void: #050914;
        --bg-glass: rgba(13, 22, 45, 0.75);
        --bg-bot: rgba(0, 240, 255, 0.04);
        --bg-user: rgba(41, 121, 255, 0.14);
        --text-primary: #e2f1f8;
        --text-secondary: #78909c;
        --accent-cyan: #00f0ff;
        --accent-blue: #2979ff;
        --accent-purple: #7b61ff;
        --accent-orange: #ff6b35;
        --accent-error: #ff1744;
        --border-neon: rgba(0, 240, 255, 0.28);
        --border-user: rgba(41, 121, 255, 0.28);
        --glow-cyan: 0 0 18px rgba(0, 240, 255, 0.18);
        --font-main: "Inter", sans-serif;
        --font-code: "Fira Code", monospace;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-void);
        background-image:
          radial-gradient(
            circle at 15% 50%,
            rgba(41, 121, 255, 0.08),
            transparent 30%
          ),
          radial-gradient(
            circle at 85% 30%,
            rgba(0, 240, 255, 0.05),
            transparent 30%
          ),
          linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
        background-size:
          100% 100%,
          100% 100%,
          30px 30px,
          30px 30px;
        color: var(--text-primary);
        font-family: var(--font-main);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ===== HEADER ===== */
      header {
        background: var(--bg-glass);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        padding: 0.6rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        border-bottom: 1px solid var(--border-neon);
        box-shadow: var(--glow-cyan);
        z-index: 10;
        flex-wrap: wrap;
      }

      .logo {
        font-family: var(--font-code);
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-primary);
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        text-transform: uppercase;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .logo svg {
        color: var(--accent-cyan);
        filter: drop-shadow(0 0 6px var(--accent-cyan));
      }

      .mode-tabs {
        display: flex;
        gap: 0.3rem;
        flex: 1;
        justify-content: center;
      }

      .mode-tab {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-secondary);
        padding: 0.38rem 0.9rem;
        border-radius: 20px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: var(--font-main);
        white-space: nowrap;
      }
      .mode-tab:hover {
        border-color: rgba(255, 255, 255, 0.3);
        color: var(--text-primary);
      }

      .mode-tab.active[data-mode="explain"] {
        background: rgba(0, 240, 255, 0.1);
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
        box-shadow: 0 0 12px rgba(0, 240, 255, 0.12);
      }
      .mode-tab.active[data-mode="practice"] {
        background: rgba(123, 97, 255, 0.1);
        border-color: var(--accent-purple);
        color: var(--accent-purple);
        box-shadow: 0 0 12px rgba(123, 97, 255, 0.12);
      }
      .mode-tab.active[data-mode="test"] {
        background: rgba(255, 107, 53, 0.1);
        border-color: var(--accent-orange);
        color: var(--accent-orange);
        box-shadow: 0 0 12px rgba(255, 107, 53, 0.12);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        flex-shrink: 0;
      }

      .new-chat-btn {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text-secondary);
        padding: 0.38rem 0.8rem;
        border-radius: 8px;
        font-size: 0.78rem;
        cursor: pointer;
        transition: all 0.2s;
        font-family: var(--font-main);
        white-space: nowrap;
      }
      .new-chat-btn:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }

      .status-badge {
        font-size: 0.72rem;
        padding: 0.3rem 0.7rem;
        border-radius: 20px;
        background: rgba(0, 240, 255, 0.05);
        color: var(--accent-cyan);
        border: 1px solid var(--border-neon);
        display: flex;
        align-items: center;
        gap: 5px;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }
      .status-dot {
        width: 5px;
        height: 5px;
        background: var(--accent-cyan);
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      /* ===== SUBJECT BAR ===== */
      .subject-bar {
        background: rgba(5, 9, 20, 0.55);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0, 240, 255, 0.08);
        padding: 0.45rem 1.5rem;
        display: flex;
        gap: 0.4rem;
        overflow-x: auto;
        z-index: 9;
        scrollbar-width: none;
        flex-shrink: 0;
      }
      .subject-bar::-webkit-scrollbar {
        display: none;
      }

      .subject-chip {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.07);
        color: var(--text-secondary);
        padding: 0.28rem 0.7rem;
        border-radius: 20px;
        font-size: 0.76rem;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        font-family: var(--font-main);
        flex-shrink: 0;
      }
      .subject-chip:hover {
        border-color: rgba(255, 255, 255, 0.22);
        color: var(--text-primary);
      }
      .subject-chip.active {
        background: rgba(41, 121, 255, 0.12);
        border-color: var(--accent-blue);
        color: var(--accent-blue);
      }

      /* ===== CHAT AREA ===== */
      #chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem 1rem;
        display: flex;
        flex-direction: column;
        scroll-behavior: smooth;
      }

      .chat-content {
        max-width: 850px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
        padding-bottom: 1rem;
      }

      /* ===== MESSAGES ===== */
      .message-wrapper {
        display: flex;
        width: 100%;
        animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(14px);
      }
      .message-wrapper.user {
        justify-content: flex-end;
      }

      .message-content {
        max-width: 86%;
        display: flex;
        gap: 0.7rem;
      }
      .message-wrapper.user .message-content {
        flex-direction: row-reverse;
      }

      .avatar {
        width: 35px;
        height: 35px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        background: var(--bg-glass);
        border: 1px solid var(--border-neon);
        box-shadow: var(--glow-cyan);
      }
      .message-wrapper.user .avatar {
        border-color: var(--border-user);
        box-shadow: 0 0 10px rgba(41, 121, 255, 0.18);
        background: rgba(41, 121, 255, 0.1);
      }
      .avatar svg {
        color: var(--accent-cyan);
        width: 17px;
        height: 17px;
      }
      .message-wrapper.user .avatar svg {
        color: var(--accent-blue);
      }

      .bubble-wrapper {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .mode-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 0.67rem;
        padding: 0.12rem 0.5rem;
        border-radius: 10px;
        border: 1px solid;
        width: fit-content;
        opacity: 0.7;
        font-family: var(--font-code);
        letter-spacing: 0.3px;
      }
      .mode-badge.explain {
        color: var(--accent-cyan);
        border-color: rgba(0, 240, 255, 0.25);
        background: rgba(0, 240, 255, 0.05);
      }
      .mode-badge.practice {
        color: var(--accent-purple);
        border-color: rgba(123, 97, 255, 0.25);
        background: rgba(123, 97, 255, 0.05);
      }
      .mode-badge.test {
        color: var(--accent-orange);
        border-color: rgba(255, 107, 53, 0.25);
        background: rgba(255, 107, 53, 0.05);
      }

      .message-bubble {
        padding: 0.85rem 1.1rem;
        border-radius: 14px;
        line-height: 1.65;
        font-size: 0.91rem;
        position: relative;
        overflow-wrap: break-word;
        word-break: break-word;
      }
      .bot .message-bubble {
        background: var(--bg-bot);
        border: 1px solid var(--border-neon);
        border-top-left-radius: 4px;
        backdrop-filter: blur(5px);
      }
      .user .message-bubble {
        background: var(--bg-user);
        border: 1px solid var(--border-user);
        border-top-right-radius: 4px;
      }
      .error .message-bubble {
        border-color: var(--accent-error) !important;
        background: rgba(255, 23, 68, 0.08) !important;
        color: #ff8a80;
      }

      /* Message actions */
      .msg-actions {
        display: flex;
        gap: 0.35rem;
        opacity: 0;
        transition: opacity 0.2s;
        flex-wrap: wrap;
      }
      .message-wrapper:hover .msg-actions {
        opacity: 1;
      }

      .action-btn {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.09);
        color: var(--text-secondary);
        padding: 0.18rem 0.55rem;
        border-radius: 8px;
        font-size: 0.7rem;
        cursor: pointer;
        transition: all 0.15s;
        font-family: var(--font-main);
      }
      .action-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-primary);
        border-color: rgba(255, 255, 255, 0.2);
      }

      /* ===== MARKDOWN ===== */
      .markdown-body {
        color: var(--text-primary);
      }
      .markdown-body p {
        margin-bottom: 0.78rem;
      }
      .markdown-body p:last-child {
        margin-bottom: 0;
      }
      .markdown-body ul,
      .markdown-body ol {
        margin-left: 1.35rem;
        margin-bottom: 0.78rem;
      }
      .markdown-body li {
        margin-bottom: 0.2rem;
      }
      .markdown-body strong {
        color: var(--accent-cyan);
        font-weight: 600;
      }
      .markdown-body em {
        color: #b0bec5;
      }
      .markdown-body a {
        color: var(--accent-blue);
        text-decoration: none;
      }
      .markdown-body a:hover {
        text-decoration: underline;
      }
      .markdown-body blockquote {
        border-left: 3px solid var(--accent-cyan);
        padding-left: 1rem;
        margin: 0.65rem 0;
        color: var(--text-secondary);
      }
      .markdown-body table {
        border-collapse: collapse;
        width: 100%;
        margin: 0.65rem 0;
        font-size: 0.88rem;
      }
      .markdown-body th,
      .markdown-body td {
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0.45rem 0.7rem;
      }
      .markdown-body th {
        background: rgba(0, 240, 255, 0.05);
        color: var(--accent-cyan);
      }

      .markdown-body pre {
        background: #090d18;
        padding: 1.1rem;
        border-radius: 8px;
        overflow-x: auto;
        margin: 0.8rem 0;
        border: 1px solid rgba(0, 240, 255, 0.18);
      }
      .markdown-body code {
        font-family: var(--font-code);
        font-size: 0.82rem;
        background: rgba(255, 255, 255, 0.07);
        padding: 0.15rem 0.35rem;
        border-radius: 4px;
        color: #82aaff;
      }
      .markdown-body pre code {
        background: transparent;
        padding: 0;
        color: inherit;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3 {
        color: #fff;
        margin-top: 1.2rem;
        margin-bottom: 0.55rem;
        font-weight: 600;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding-bottom: 0.25rem;
      }
      .markdown-body h1 {
        font-size: 1.25rem;
      }
      .markdown-body h2 {
        font-size: 1.12rem;
      }
      .markdown-body h3 {
        font-size: 1rem;
      }

      .chat-image {
        max-width: 100%;
        max-height: 280px;
        border-radius: 8px;
        border: 1px solid var(--border-neon);
        margin-bottom: 0.6rem;
        object-fit: contain;
        background: rgba(0, 0, 0, 0.5);
      }

      /* ===== SUGGESTIONS ===== */
      .suggestions-container {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        margin-top: 0.9rem;
      }
      .suggestion-chip {
        background: rgba(41, 121, 255, 0.07);
        border: 1px solid rgba(41, 121, 255, 0.22);
        color: var(--text-primary);
        padding: 0.42rem 0.85rem;
        border-radius: 20px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
        font-family: var(--font-main);
      }
      .suggestion-chip:hover {
        background: rgba(41, 121, 255, 0.18);
        border-color: var(--accent-blue);
        transform: translateY(-2px);
      }

      /* ===== INPUT AREA ===== */
      .input-container {
        background: linear-gradient(to top, var(--bg-void) 75%, transparent);
        padding: 0.65rem 1.5rem 1.4rem;
        z-index: 10;
        flex-shrink: 0;
      }

      .input-wrapper {
        max-width: 850px;
        margin: 0 auto;
      }

      #staging-area {
        display: none;
        padding: 0.6rem 0.85rem;
        background: rgba(13, 22, 45, 0.85);
        border: 1px solid rgba(0, 240, 255, 0.18);
        border-bottom: none;
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
        backdrop-filter: blur(10px);
      }

      .staged-file {
        position: relative;
        display: inline-block;
      }
      .staged-file img {
        height: 52px;
        border-radius: 6px;
        border: 1px solid var(--accent-cyan);
        object-fit: cover;
      }

      .remove-file {
        position: absolute;
        top: -7px;
        right: -7px;
        background: var(--accent-error);
        color: white;
        border: none;
        border-radius: 50%;
        width: 19px;
        height: 19px;
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s;
      }
      .remove-file:hover {
        transform: scale(1.15);
      }

      .input-box {
        background: rgba(13, 22, 45, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        display: flex;
        align-items: flex-end;
        padding: 0.38rem;
        transition: all 0.3s;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
      }
      .input-box.has-staging {
        border-top-left-radius: 0;
        border-top-right-radius: 0;
        border-top: 1px dashed rgba(0, 240, 255, 0.18);
        border-color: rgba(0, 240, 255, 0.18);
      }
      .input-box:focus-within {
        border-color: var(--accent-cyan);
        box-shadow: var(--glow-cyan);
      }

      textarea {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 0.91rem;
        resize: none;
        max-height: 200px;
        min-height: 24px;
        padding: 0.62rem 0.4rem;
        outline: none;
        line-height: 1.5;
        font-family: inherit;
      }
      textarea::placeholder {
        color: var(--text-secondary);
      }

      .icon-btn {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 0.42rem;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        height: 38px;
        width: 38px;
        flex-shrink: 0;
      }
      .icon-btn:hover {
        color: var(--accent-cyan);
        background: rgba(0, 240, 255, 0.08);
      }

      .send-btn {
        color: var(--accent-cyan);
        background: rgba(0, 240, 255, 0.08);
        margin-left: 0.3rem;
      }
      .send-btn:hover:not(:disabled) {
        background: var(--accent-cyan);
        color: #000;
        box-shadow: 0 0 18px rgba(0, 240, 255, 0.45);
      }
      .send-btn:disabled {
        color: rgba(255, 255, 255, 0.18);
        background: transparent;
        cursor: not-allowed;
      }

      /* ===== TYPING INDICATOR ===== */
      .typing-indicator {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 0.35rem 0.2rem;
      }
      .dot {
        width: 7px;
        height: 7px;
        background: var(--accent-cyan);
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
      }
      .dot:nth-child(1) {
        animation-delay: -0.32s;
      }
      .dot:nth-child(2) {
        animation-delay: -0.16s;
      }

      /* ===== ANIMATIONS ===== */
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0);
          opacity: 0.3;
        }
        40% {
          transform: scale(1);
          opacity: 1;
          box-shadow: 0 0 8px var(--accent-cyan);
        }
      }
      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.4);
        }
        70% {
          box-shadow: 0 0 0 5px rgba(0, 240, 255, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(0, 240, 255, 0);
        }
      }

      /* ===== SCROLLBAR ===== */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(120, 144, 156, 0.22);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 240, 255, 0.38);
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        .message-content {
          max-width: 93%;
        }
        header {
          padding: 0.6rem 0.9rem;
        }
        .mode-tabs {
          order: 3;
          width: 100%;
          justify-content: center;
        }
        .new-chat-btn {
          display: none;
        }
        .input-container {
          padding: 0.5rem 0.5rem 1rem;
        }
        .subject-bar {
          padding: 0.4rem 0.9rem;
        }
        .logo {
          font-size: 0.95rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- ===== HEADER ===== -->
    <header>
      <div class="logo">
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polygon
            points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"
          ></polygon>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        EDUBOT
      </div>

      <div class="mode-tabs" id="mode-tabs">
        <button class="mode-tab active" data-mode="explain">
          🎓 Giải thích
        </button>
        <button class="mode-tab" data-mode="practice">💪 Luyện tập</button>
        <button class="mode-tab" data-mode="test">📝 Kiểm tra</button>
      </div>

      <div class="header-right">
        <button class="new-chat-btn" onclick="newChat()">✦ Chat mới</button>
        <div class="status-badge">
          <div class="status-dot"></div>
          Online
        </div>
      </div>
    </header>

    <!-- ===== SUBJECT BAR ===== -->
    <div class="subject-bar" id="subject-bar">
      <button class="subject-chip active" data-subject="general">
        🔭 Tổng hợp
      </button>
      <button class="subject-chip" data-subject="math">🔢 Toán</button>
      <button class="subject-chip" data-subject="phys">⚡ Vật lý</button>
      <button class="subject-chip" data-subject="chem">⚗️ Hóa học</button>
      <button class="subject-chip" data-subject="bio">🧬 Sinh học</button>
      <button class="subject-chip" data-subject="code">💻 Lập trình</button>
      <button class="subject-chip" data-subject="lit">📚 Văn học</button>
      <button class="subject-chip" data-subject="his">🌍 Lịch/Địa</button>
    </div>

    <!-- ===== CHAT AREA ===== -->
    <main id="chat-container">
      <div class="chat-content" id="chat-content"></div>
    </main>

    <!-- ===== INPUT AREA ===== -->
    <div class="input-container">
      <div class="input-wrapper">
        <input
          type="file"
          id="file-input"
          accept="image/png,image/jpeg,image/webp"
          style="display: none"
        />

        <div id="staging-area">
          <div class="staged-file">
            <img id="preview-img" src="" alt="Preview" />
            <button type="button" class="remove-file" onclick="removeImage()">
              ✕
            </button>
          </div>
        </div>

        <div class="input-box" id="input-box">
          <button
            type="button"
            class="icon-btn"
            id="attach-btn"
            title="Đính kèm ảnh"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"
              />
            </svg>
          </button>
          <textarea
            id="message-input"
            rows="1"
            placeholder="Nhập câu hỏi... (Shift+Enter xuống dòng)"
          ></textarea>
          <button
            type="button"
            class="icon-btn send-btn"
            id="send-btn"
            disabled
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script>
      // ================================================================
      // CONFIGURATION
      // ================================================================
      const MODES = {
        explain: { icon: "🎓", label: "Giải thích" },
        practice: { icon: "💪", label: "Luyện tập" },
        test: { icon: "📝", label: "Kiểm tra" },
      };

      const SUBJECTS = {
        general: { icon: "🔭", label: "Tổng hợp" },
        math: { icon: "🔢", label: "Toán" },
        phys: { icon: "⚡", label: "Vật lý" },
        chem: { icon: "⚗️", label: "Hóa học" },
        bio: { icon: "🧬", label: "Sinh học" },
        code: { icon: "💻", label: "Lập trình" },
        lit: { icon: "📚", label: "Văn học" },
        his: { icon: "🌍", label: "Lịch/Địa" },
      };

      const WELCOME = {
        explain: {
          intro:
            'Tôi là <strong>EduBot</strong> ở chế độ <strong style="color:var(--accent-cyan)">🎓 Giải thích</strong>. Tôi sẽ giải thích chi tiết, có ví dụ thực tế và từng bước rõ ràng.',
          chips: [
            { icon: "⚛️", text: "Nguyên lý bất định Heisenberg là gì?" },
            { icon: "💻", text: "Giải thích Big O notation trong thuật toán." },
            { icon: "🧪", text: "Phân biệt phản ứng oxi hóa và phản ứng khử." },
          ],
        },
        practice: {
          intro:
            'Tôi là <strong>EduBot</strong> ở chế độ <strong style="color:var(--accent-purple)">💪 Luyện tập</strong>. Tôi sẽ gợi ý từng bước, <strong>KHÔNG giải hộ</strong>. Bạn phải tự tư duy!',
          chips: [
            { icon: "📐", text: "Tôi muốn luyện tập tích phân từng phần." },
            {
              icon: "⚗️",
              text: "Cho tôi bài tập cân bằng phương trình hóa học.",
            },
            {
              icon: "🖥️",
              text: "Hướng dẫn tôi viết thuật toán sắp xếp nổi bọt.",
            },
          ],
        },
        test: {
          intro:
            'Tôi là <strong>EduBot</strong> ở chế độ <strong style="color:var(--accent-orange)">📝 Kiểm tra</strong>. Cho tôi biết chủ đề và tôi sẽ ra đề, chấm bài cho bạn!',
          chips: [
            { icon: "🔢", text: "Kiểm tra đại số tuyến tính của tôi." },
            { icon: "⚗️", text: "Ra 5 câu hỏi về hóa học hữu cơ lớp 11." },
            { icon: "💻", text: "Kiểm tra Python: cấu trúc dữ liệu cơ bản." },
          ],
        },
      };

      // ================================================================
      // STATE
      // ================================================================
      const STATE = {
        mode: "explain",
        subject: "general",
        chatHistory: [], // Gemini-format: [{role, parts}]
        isGenerating: false,
        currentImageData: null,
        currentMimeType: null,
      };

      // ================================================================
      // SVG TEMPLATES
      // ================================================================
      const SVG_BOT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>`;
      const SVG_USER = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`;
      const SVG_ERR = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;

      // ================================================================
      // DOM REFERENCES
      // ================================================================
      const chatContainer = document.getElementById("chat-container");
      const chatContent = document.getElementById("chat-content");
      const messageInput = document.getElementById("message-input");
      const sendBtn = document.getElementById("send-btn");
      const attachBtn = document.getElementById("attach-btn");
      const fileInput = document.getElementById("file-input");
      const stagingArea = document.getElementById("staging-area");
      const previewImg = document.getElementById("preview-img");
      const inputBox = document.getElementById("input-box");

      // ================================================================
      // LIBRARY INIT
      // ================================================================
      marked.setOptions({
        highlight: (code, lang) => {
          const language = hljs.getLanguage(lang) ? lang : "plaintext";
          return hljs.highlight(code, { language }).value;
        },
        langPrefix: "hljs language-",
        breaks: true,
      });

      // ================================================================
      // WELCOME MESSAGE
      // ================================================================
      function renderWelcome() {
        const cfg = WELCOME[STATE.mode] || WELCOME.explain;
        const subLabel = SUBJECTS[STATE.subject]?.label || "Tổng hợp";
        const chips = cfg.chips
          .map(
            (c) =>
              `<button class="suggestion-chip" onclick="quickQuestion('${c.text}')">${c.icon} ${c.text}</button>`,
          )
          .join("");

        chatContent.innerHTML = `
        <div class="message-wrapper bot" style="animation-delay:0.05s">
          <div class="message-content">
            <div class="avatar">${SVG_BOT}</div>
            <div class="bubble-wrapper">
              <div class="message-bubble markdown-body">
                <p>${cfg.intro}</p>
                ${STATE.subject !== "general" ? `<p>📚 Môn đang chọn: <strong>${subLabel}</strong></p>` : ""}
                <p>Hệ thống sẵn sàng. Bạn muốn làm gì hôm nay?</p>
                <div class="suggestions-container">${chips}</div>
              </div>
            </div>
          </div>
        </div>`;
      }

      // ================================================================
      // MODE SWITCHING
      // ================================================================
      document.getElementById("mode-tabs").addEventListener("click", (e) => {
        const tab = e.target.closest(".mode-tab");
        if (!tab || STATE.isGenerating) return;
        const newMode = tab.dataset.mode;
        if (newMode === STATE.mode) return;
        STATE.mode = newMode;
        document
          .querySelectorAll(".mode-tab")
          .forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        newChat();
      });

      // ================================================================
      // SUBJECT SWITCHING
      // ================================================================
      document.getElementById("subject-bar").addEventListener("click", (e) => {
        const chip = e.target.closest(".subject-chip");
        if (!chip) return;
        STATE.subject = chip.dataset.subject;
        document
          .querySelectorAll(".subject-chip")
          .forEach((c) => c.classList.remove("active"));
        chip.classList.add("active");
        if (STATE.chatHistory.length === 0) renderWelcome();
      });

      // ================================================================
      // NEW CHAT
      // ================================================================
      window.newChat = function () {
        STATE.chatHistory = [];
        renderWelcome();
        scrollToBottom();
      };

      // ================================================================
      // QUICK QUESTIONS
      // ================================================================
      window.quickQuestion = function (text) {
        messageInput.value = text;
        handleInput();
        sendMessage();
      };

      // ================================================================
      // MESSAGE RENDERING
      // ================================================================
      function appendMessage(role, text, imageSrc = null) {
        const wrapper = document.createElement("div");
        wrapper.className = `message-wrapper ${role}`;

        let contentHtml = imageSrc
          ? `<img src="${imageSrc}" class="chat-image" alt="Attached image"/>`
          : "";

        if (role === "user") {
          const escaped = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
          contentHtml += `<div style="white-space:pre-wrap;">${escaped}</div>`;
          wrapper.innerHTML = `
          <div class="message-content">
            <div class="avatar">${SVG_USER}</div>
            <div class="bubble-wrapper">
              <div class="message-bubble">${contentHtml}</div>
            </div>
          </div>`;
        } else {
          const safeHtml = DOMPurify.sanitize(marked.parse(text));
          const modeInfo = MODES[STATE.mode] || MODES.explain;
          wrapper.innerHTML = `
          <div class="message-content">
            <div class="avatar">${SVG_BOT}</div>
            <div class="bubble-wrapper">
              <span class="mode-badge ${STATE.mode}">${modeInfo.icon} ${modeInfo.label}</span>
              <div class="message-bubble markdown-body">${contentHtml}${safeHtml}</div>
              <div class="msg-actions">
                <button class="action-btn" onclick="copyBubble(this)">📋 Sao chép</button>
                <button class="action-btn" onclick="quickQuestion('Giải thích lại theo cách đơn giản hơn.')">🔄 Đơn giản hơn</button>
                <button class="action-btn" onclick="quickQuestion('Cho tôi thêm ví dụ thực tế về phần vừa giải thích.')">💡 Ví dụ thêm</button>
              </div>
            </div>
          </div>`;

          // Render LaTeX
          renderMathInElement(wrapper.querySelector(".message-bubble"), {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "$", right: "$", display: false },
              { left: "\\(", right: "\\)", display: false },
              { left: "\\[", right: "\\]", display: true },
            ],
            throwOnError: false,
          });
        }

        chatContent.appendChild(wrapper);
        scrollToBottom();
        return wrapper;
      }

      function showLoading() {
        const w = document.createElement("div");
        w.className = "message-wrapper bot";
        w.id = "loading-indicator";
        w.innerHTML = `
        <div class="message-content">
          <div class="avatar">${SVG_BOT}</div>
          <div class="bubble-wrapper">
            <div class="message-bubble">
              <div class="typing-indicator">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
              </div>
            </div>
          </div>
        </div>`;
        chatContent.appendChild(w);
        scrollToBottom();
        return w;
      }

      function showError(msg) {
        const w = document.createElement("div");
        w.className = "message-wrapper bot error";
        w.innerHTML = `
        <div class="message-content">
          <div class="avatar">${SVG_ERR}</div>
          <div class="bubble-wrapper">
            <div class="message-bubble error">⚠️ <strong>Lỗi:</strong> ${msg}</div>
          </div>
        </div>`;
        chatContent.appendChild(w);
        scrollToBottom();
      }

      function scrollToBottom() {
        setTimeout(
          () =>
            chatContainer.scrollTo({
              top: chatContainer.scrollHeight,
              behavior: "smooth",
            }),
          50,
        );
      }

      // ================================================================
      // MESSAGE ACTIONS
      // ================================================================
      window.copyBubble = function (btn) {
        const bubble = btn
          .closest(".bubble-wrapper")
          .querySelector(".message-bubble");
        navigator.clipboard.writeText(bubble.innerText).then(() => {
          const orig = btn.textContent;
          btn.textContent = "✅ Đã sao chép";
          setTimeout(() => (btn.textContent = orig), 2000);
        });
      };

      // ================================================================
      // FILE HANDLING
      // ================================================================
      attachBtn.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith("image/")) {
          showError("Chỉ hỗ trợ ảnh PNG, JPEG, WEBP.");
          return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
          STATE.currentImageData = ev.target.result.split(",")[1];
          STATE.currentMimeType = file.type;
          previewImg.src = ev.target.result;
          stagingArea.style.display = "block";
          inputBox.classList.add("has-staging");
          handleInput();
        };
        reader.readAsDataURL(file);
        fileInput.value = "";
      });

      window.removeImage = function () {
        STATE.currentImageData = null;
        STATE.currentMimeType = null;
        stagingArea.style.display = "none";
        inputBox.classList.remove("has-staging");
        handleInput();
      };

      // ================================================================
      // INPUT HANDLING
      // ================================================================
      messageInput.addEventListener("input", handleInput);
      messageInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          if (!sendBtn.disabled && !STATE.isGenerating) sendMessage();
        }
      });
      sendBtn.addEventListener("click", () => {
        if (!STATE.isGenerating) sendMessage();
      });

      function handleInput() {
        messageInput.style.height = "auto";
        messageInput.style.height =
          Math.min(messageInput.scrollHeight, 200) + "px";
        sendBtn.disabled =
          (!messageInput.value.trim() && !STATE.currentImageData) ||
          STATE.isGenerating;
      }

      // ================================================================
      // SEND MESSAGE — FIXED (no duplicate remove, no undefined var)
      // ================================================================
      async function sendMessage() {
        if (STATE.isGenerating) return;

        const text = messageInput.value.trim();
        const imageToSend = STATE.currentImageData;
        const mimeToSend = STATE.currentMimeType;
        const imageSrcUI = imageToSend ? previewImg.src : null;

        if (!text && !imageToSend) return;

        // Lock UI
        STATE.isGenerating = true;
        sendBtn.disabled = true;

        // Show user message
        appendMessage("user", text, imageSrcUI);

        // Clear input fields
        messageInput.value = "";
        messageInput.style.height = "auto";
        removeImage();

        // Show typing indicator
        const loadingEl = showLoading();

        try {
          const prompt = text || "Vui lòng phân tích chi tiết hình ảnh này.";

          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: prompt,
              image: imageToSend
                ? `data:${mimeToSend};base64,${imageToSend}`
                : null,
              history: STATE.chatHistory.slice(-20), // Context window: last 20 turns
              mode: STATE.mode,
              subject: STATE.subject,
            }),
          });

          // ✅ FIX: Only remove loading indicator ONCE, right here
          if (loadingEl.parentNode) loadingEl.remove();

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(
              errData.error || `Lỗi máy chủ (HTTP ${response.status})`,
            );
          }

          const data = await response.json();
          // ✅ FIX: Use data.reply, not undefined responseText
          const replyText = data.reply || "Không có phản hồi.";

          appendMessage("bot", replyText);

          // Update conversation history (Gemini format for context)
          const userParts = [{ text: prompt }];
          // Note: image not stored in history to keep payload small
          // The AI response captures the image context for future turns

          STATE.chatHistory.push(
            { role: "user", parts: userParts },
            { role: "model", parts: [{ text: replyText }] },
          );
        } catch (error) {
          // ✅ FIX: Safe remove — won't crash if already removed
          if (loadingEl.parentNode) loadingEl.remove();
          console.error("EduBot error:", error);
          showError(
            error.message || "Không thể kết nối tới máy chủ. Vui lòng thử lại.",
          );
        } finally {
          STATE.isGenerating = false;
          handleInput();
        }
      }

      // ================================================================
      // INIT
      // ================================================================
      renderWelcome();
    </script>
  </body>
</html>
